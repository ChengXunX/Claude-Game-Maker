<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <!-- 主渐变：蓝紫色科技感 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <!-- 高光渐变 -->
    <linearGradient id="highlightGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <!-- 代码元素渐变 -->
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>

  <!-- 背景圆形（可选，增加现代感） -->
  <circle cx="24" cy="24" r="22" fill="url(#mainGradient)" opacity="0.1"/>

  <!-- 游戏手柄主体 - 左侧握把 -->
  <path d="M12 18C12 14.686 14.686 12 18 12H22C23.105 12 24 12.895 24 14V20C24 21.105 23.105 22 22 22H18C14.686 22 12 19.314 12 16V18Z"
        fill="url(#mainGradient)" stroke="url(#highlightGradient)" stroke-width="1.5"/>

  <!-- 游戏手柄主体 - 右侧握把 -->
  <path d="M36 18C36 14.686 33.314 12 30 12H26C24.895 12 24 12.895 24 14V20C24 21.105 24.895 22 26 22H30C33.314 22 36 19.314 36 16V18Z"
        fill="url(#mainGradient)" stroke="url(#highlightGradient)" stroke-width="1.5"/>

  <!-- 手柄中间连接部分 -->
  <rect x="22" y="14" width="4" height="8" rx="1" fill="url(#highlightGradient)"/>

  <!-- 左侧方向键（十字键） -->
  <rect x="15" y="26" width="3" height="7" rx="0.5" fill="url(#mainGradient)" opacity="0.9"/>
  <rect x="13" y="29" width="7" height="3" rx="0.5" fill="url(#mainGradient)" opacity="0.9"/>

  <!-- 右侧动作按钮（A、B、X、Y布局） -->
  <circle cx="32" cy="28" r="1.8" fill="url(#codeGradient)"/>
  <circle cx="35" cy="31" r="1.8" fill="url(#mainGradient)" opacity="0.7"/>
  <circle cx="29" cy="31" r="1.8" fill="url(#mainGradient)" opacity="0.7"/>
  <circle cx="32" cy="34" r="1.8" fill="url(#mainGradient)" opacity="0.7"/>

  <!-- 代码括号元素 < > - 代表编程/自动化 -->
  <!-- 左括号 < -->
  <path d="M8 24L4 28L8 32" stroke="url(#codeGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- 右括号 > -->
  <path d="M40 24L44 28L40 32" stroke="url(#codeGradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- 自动化齿轮装饰（小） -->
  <circle cx="6" cy="28" r="1.5" fill="none" stroke="url(#codeGradient)" stroke-width="1" stroke-dasharray="2 1"/>
  <circle cx="42" cy="28" r="1.5" fill="none" stroke="url(#codeGradient)" stroke-width="1" stroke-dasharray="2 1"/>

  <!-- AI/自动化电路线装饰 -->
  <path d="M10 36L14 36L16 38L20 38" stroke="url(#codeGradient)" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <path d="M38 36L34 36L32 38L28 38" stroke="url(#codeGradient)" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

  <!-- 底部连接点 - 代表多Agent协作 -->
  <circle cx="20" cy="40" r="1.5" fill="url(#mainGradient)"/>
  <circle cx="28" cy="40" r="1.5" fill="url(#mainGradient)"/>
  <line x1="20" y1="40" x2="28" y2="40" stroke="url(#codeGradient)" stroke-width="1" opacity="0.5"/>

  <!-- 顶部光效装饰 -->
  <ellipse cx="24" cy="10" rx="8" ry="2" fill="url(#highlightGradient)" opacity="0.3"/>
</svg>