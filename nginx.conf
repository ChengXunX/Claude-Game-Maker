# ChengXun Game Maker Nginx 配置
# 使用非常用端口避免被扫描封禁

# WebSocket 升级映射（仅当客户端请求升级时才升级连接）
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 18080;
    server_name _;

    # 前端静态文件
    root /var/www/game-maker;
    index index.html;

    # 安全头（后端已设置，Nginx 不再重复添加，避免飞书等外部回调解析异常）

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # 安装页面代理到后端（必须在SPA规则之前）
    location = /install {
        proxy_pass http://127.0.0.1:19922;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # OpenAPI 文档代理（必须在SPA规则之前）
    location /v3/api-docs {
        proxy_pass http://127.0.0.1:19922;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Swagger UI 代理（^~ 前缀优先于正则匹配，防止 .css/.js 被静态资源规则拦截）
    location ^~ /swagger-ui {
        proxy_pass http://127.0.0.1:19922;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 前端路由 - SPA 支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SSE 流式接口（AI助手等）- 需要长超时和禁用缓冲
    location /api/v1/ai-assistant/stream/ {
        proxy_pass http://127.0.0.1:19922;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # SSE 必须禁用缓冲，否则事件不会实时推送
        proxy_buffering off;
        proxy_cache off;

        # SSE 长超时（AI 响应可能需要几分钟）
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # SSE 流式接口（项目讨论）- 需要长超时和禁用缓冲
    location /api/project-discussions {
        proxy_pass http://127.0.0.1:19922;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Authorization $http_authorization;

        # SSE 必须禁用缓冲
        proxy_buffering off;
        proxy_cache off;

        # SSE 长超时
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # API 反向代理到后端
    location /api/ {
        proxy_pass http://127.0.0.1:19922;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 优先使用上游代理传来的协议头（支持 HTTPS 代理链）
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # WebSocket 支持（仅当客户端发送 Upgrade 头时才升级）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Actuator 监控代理
    location /actuator/ {
        proxy_pass http://127.0.0.1:19922;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 限制访问 IP
        allow 127.0.0.1;
        allow ::1;
        deny all;
    }

    # 飞书 Webhook 代理
    location /feishu/ {
        proxy_pass http://127.0.0.1:19922;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 钉钉 Webhook 代理
    location /dingtalk/ {
        proxy_pass http://127.0.0.1:19922;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket 代理
    location /ws/ {
        proxy_pass http://127.0.0.1:19922;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
