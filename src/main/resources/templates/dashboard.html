<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仪表盘 - ChengXun Game Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">
                <i class="bi bi-controller"></i> ChengXun Game Maker
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/}">
                            <i class="bi bi-speedometer2"></i> 仪表盘
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/agents}">
                            <i class="bi bi-robot"></i> Agents
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/projects}">
                            <i class="bi bi-folder"></i> 项目
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/tokens}">
                            <i class="bi bi-key"></i> Token 管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/skills}">
                            <i class="bi bi-lightning"></i> 技能
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/monitor}">
                            <i class="bi bi-graph-up"></i> 监控
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/ai-assistant}">
                            <i class="bi bi-robot"></i> AI助手
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/admin/users}">
                            <i class="bi bi-people"></i> 用户管理
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAuthority('PERM_roles:manage')">
                        <a class="nav-link" th:href="@{/roles}">
                            <i class="bi bi-shield-lock"></i> 角色管理
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span th:text="${username}">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                            <li>
                                <a class="dropdown-item" th:href="@{/profile}">
                                    <i class="bi bi-person"></i> 个人中心
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <button class="dropdown-item" type="submit">
                                        <i class="bi bi-box-arrow-right"></i> 退出登录
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <!-- 项目选择器 -->
        <div class="row mb-3" th:if="${#lists.size(projects) > 0}">
            <div class="col-12">
                <div class="card bg-dark border-secondary">
                    <div class="card-body py-2">
                        <form class="row align-items-center" method="get" th:action="@{/}">
                            <div class="col-auto">
                                <label class="col-form-label text-muted">
                                    <i class="bi bi-funnel"></i> 筛选项目:
                                </label>
                            </div>
                            <div class="col-auto">
                                <select name="projectId" class="form-select form-select-sm bg-dark text-light border-secondary" onchange="this.form.submit()">
                                    <option value="">全部项目</option>
                                    <option th:each="p : ${projects}"
                                            th:value="${p.id}"
                                            th:text="${p.name}"
                                            th:selected="${p.id == selectedProjectId}"></option>
                                </select>
                            </div>
                            <div class="col-auto" th:if="${selectedProject != null}">
                                <span class="badge bg-info">
                                    <i class="bi bi-folder"></i>
                                    <span th:text="${selectedProject.name}"></span>
                                    <span th:if="${selectedProject.goal != null}" th:text="' - ' + ${selectedProject.goal}"></span>
                                </span>
                                <span th:if="${selectedProject.goalStatus != null}" class="badge"
                                      th:classappend="${selectedProject.goalStatus.name() == 'COMPLETED' ? 'bg-success' : (selectedProject.goalStatus.name() == 'IN_PROGRESS' ? 'bg-warning' : 'bg-secondary')}"
                                      th:text="${selectedProject.goalStatus.name()}"></span>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- AI Assistant Banner -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card bg-gradient" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                    <div class="card-body">
                        <div class="row align-items-center">
                            <div class="col-md-8">
                                <h4 class="text-white mb-1">
                                    <i class="bi bi-robot"></i> AI系统助手
                                    <span class="badge bg-light text-dark ms-2" style="font-size: 0.7em;">智能分析</span>
                                </h4>
                                <p class="text-white-50 mb-2">
                                    系统分析员 · 知识库自进化 · 支持思考过程展示
                                </p>
                                <p class="text-white mb-0" style="font-size: 0.9em;">
                                    我可以帮你分析系统状态、解答功能问题、提供优化建议、协助故障排查
                                </p>
                            </div>
                            <div class="col-md-4 text-end">
                                <a th:href="@{/ai-assistant}" class="btn btn-light btn-lg">
                                    <i class="bi bi-chat-dots"></i> 开始对话
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card bg-primary bg-gradient text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title opacity-75">Agents</h6>
                                <h2 th:text="${agentCount}">0</h2>
                            </div>
                            <i class="bi bi-robot" style="font-size: 2.5rem; opacity: 0.5;"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-success bg-gradient text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title opacity-75">项目</h6>
                                <h2 th:text="${projectCount}">0</h2>
                            </div>
                            <i class="bi bi-folder" style="font-size: 2.5rem; opacity: 0.5;"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-info bg-gradient text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title opacity-75">技能</h6>
                                <h2 th:text="${skillCount}">0</h2>
                            </div>
                            <i class="bi bi-lightning" style="font-size: 2.5rem; opacity: 0.5;"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-warning bg-gradient text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title opacity-75">待审核</h6>
                                <h2 th:text="${pendingCount}">0</h2>
                            </div>
                            <i class="bi bi-person-clock" style="font-size: 2.5rem; opacity: 0.5;"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 项目目标进度（选中项目时显示） -->
        <div class="row mb-4" th:if="${selectedProject != null and selectedProject.hasGoal()}">
            <div class="col-12">
                <div class="card bg-dark border-secondary">
                    <div class="card-header">
                        <h5 class="mb-0">
                            <i class="bi bi-bullseye"></i> 项目目标
                            <span class="badge bg-info ms-2" th:text="${selectedProject.goalStatus.name()}"></span>
                        </h5>
                    </div>
                    <div class="card-body">
                        <p th:text="${selectedProject.goal}"></p>
                        <div class="progress mb-3" style="height: 25px;">
                            <div class="progress-bar bg-success" role="progressbar"
                                 th:style="'width: ' + ${selectedProject.goalProgress} + '%'"
                                 th:text="${selectedProject.goalProgress} + '%'"></div>
                        </div>
                        <div th:if="${selectedProject.milestones != null}">
                            <div th:each="ms : ${selectedProject.milestones}" class="d-flex align-items-center mb-2">
                                <span class="badge me-2" th:classappend="${ms.status.name() == 'COMPLETED' ? 'bg-success' : (ms.status.name() == 'IN_PROGRESS' ? 'bg-warning' : 'bg-secondary')}"
                                      th:text="${ms.status.name()}"></span>
                                <span th:text="${ms.title}" class="me-2"></span>
                                <span class="text-muted small" th:text="'(' + ${ms.assignedAgentRole} + ')'"></span>
                                <div class="progress flex-grow-1 ms-2" style="height: 8px; max-width: 200px;">
                                    <div class="progress-bar" th:style="'width: ' + ${ms.progress} + '%'"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- Agent Status -->
            <div class="col-md-8">
                <div class="card bg-dark border-secondary">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">
                            <i class="bi bi-robot"></i> Agent 状态
                            <span th:if="${selectedProject != null}" class="badge bg-info ms-2" th:text="${selectedProject.name}"></span>
                        </h5>
                        <a th:href="@{/agents}" class="btn btn-sm btn-outline-primary">查看全部</a>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-dark table-hover">
                                <thead>
                                    <tr>
                                        <th>名称</th>
                                        <th>角色</th>
                                        <th>状态</th>
                                        <th>所属项目</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="agent : ${agents}">
                                        <td th:text="${agent.name}"></td>
                                        <td>
                                            <span class="badge bg-secondary" th:text="${agent.role}"></span>
                                        </td>
                                        <td>
                                            <span th:class="${agent.alive ? 'badge bg-success' : 'badge bg-danger'}"
                                                  th:text="${agent.alive ? '在线' : '离线'}"></span>
                                            <span th:if="${agent.busy}" class="badge bg-warning">忙碌</span>
                                        </td>
                                        <td>
                                            <span th:if="${agent.definition.projectId != null}" class="badge bg-dark border border-secondary" th:text="${agent.definition.projectId}"></span>
                                            <span th:else class="text-muted">-</span>
                                        </td>
                                        <td>
                                            <a th:if="${agent.definition.projectId != null}"
                                               th:href="@{/agents/project/{projectId}/{role}(projectId=${agent.definition.projectId}, role=${agent.role})}"
                                               class="btn btn-sm btn-outline-primary">
                                                <i class="bi bi-eye"></i>
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <p th:if="${#lists.isEmpty(agents)}" class="text-muted text-center mb-0">暂无 Agent</p>
                    </div>
                </div>
            </div>

            <!-- Recent Activity -->
            <div class="col-md-4">
                <div class="card bg-dark border-secondary">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-clock-history"></i> 最近活动</h5>
                    </div>
                    <div class="card-body" style="max-height: 400px; overflow-y: auto;">
                        <div th:each="log : ${recentLogs}" class="border-bottom border-secondary pb-2 mb-2">
                            <div class="d-flex justify-content-between">
                                <span class="badge bg-primary" th:text="${log.action}"></span>
                                <small class="text-muted" th:text="${#temporals.format(log.createdAt, 'MM-dd HH:mm')}"></small>
                            </div>
                            <p class="mb-0 mt-1 small" th:text="${log.detail ?: log.target}"></p>
                        </div>
                        <p th:if="${#lists.isEmpty(recentLogs)}" class="text-muted text-center">暂无活动记录</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
