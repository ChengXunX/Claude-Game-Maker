<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>告警规则管理 - ChengXun Game Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container-fluid mt-4">
        <!-- 面包屑导航 -->
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item">
                    <a th:href="@{/alerts}" class="text-decoration-none">
                        <i class="bi bi-bell"></i> 告警中心
                    </a>
                </li>
                <li class="breadcrumb-item active">告警规则</li>
            </ol>
        </nav>

        <!-- 页面标题 -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h2><i class="bi bi-list-check"></i> 告警规则管理</h2>
                        <p class="text-muted mb-0">配置系统监控的告警规则和阈值</p>
                    </div>
                    <a th:href="@{/alerts/rules/new}" class="btn btn-primary">
                        <i class="bi bi-plus-circle"></i> 创建规则
                    </a>
                </div>
            </div>
        </div>

        <!-- 规则列表 -->
        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>规则名称</th>
                                <th>类型</th>
                                <th>指标</th>
                                <th>条件</th>
                                <th>优先级</th>
                                <th>通知方式</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="rule : ${rules}">
                                <td>
                                    <div>
                                        <strong th:text="${rule.name}">规则名称</strong>
                                        <br>
                                        <small class="text-muted" th:text="${rule.description}">规则描述</small>
                                    </div>
                                </td>
                                <td>
                                    <span class="badge bg-secondary" th:text="${rule.ruleType}">类型</span>
                                </td>
                                <td th:text="${rule.metric}">指标</td>
                                <td>
                                    <code th:text="${rule.operator} + ' ' + ${rule.threshold}">> 100</code>
                                </td>
                                <td>
                                    <span class="badge"
                                          th:classappend="${rule.priority == 'CRITICAL' ? 'bg-danger' : (rule.priority == 'HIGH' ? 'bg-warning text-dark' : (rule.priority == 'MEDIUM' ? 'bg-info' : 'bg-secondary'))}"
                                          th:text="${rule.priority}">MEDIUM</span>
                                </td>
                                <td th:text="${rule.notifyMethod}">SYSTEM</td>
                                <td>
                                    <div class="form-check form-switch">
                                        <input class="form-check-input" type="checkbox"
                                               th:checked="${rule.enabled}"
                                               th:onclick="'toggleRule(' + ${rule.id} + ', this.checked)'">
                                    </div>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/alerts/rules/{id}(id=${rule.id})}"
                                           class="btn btn-outline-primary">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <button class="btn btn-outline-danger"
                                                th:onclick="'deleteRule(' + ${rule.id} + ')'">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleRule(id, enabled) {
            fetch(`/alerts/api/rules/${id}/toggle?enabled=${enabled}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            })
            .then(response => response.json())
            .then(data => {
                if (data.status !== 'success') {
                    alert('操作失败: ' + data.message);
                    location.reload();
                }
            })
            .catch(error => {
                alert('请求失败: ' + error);
                location.reload();
            });
        }

        function deleteRule(id) {
            if (confirm('确定要删除此告警规则吗？此操作不可恢复。')) {
                fetch(`/alerts/api/rules/${id}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        location.reload();
                    } else {
                        alert('删除失败: ' + data.message);
                    }
                })
                .catch(error => alert('请求失败: ' + error));
            }
        }
    </script>
</body>
</html>
