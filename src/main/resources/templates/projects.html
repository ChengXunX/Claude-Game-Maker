<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目 - ChengXun Game Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">
                <i class="bi bi-controller"></i> ChengXun Game Maker
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">
                            <i class="bi bi-speedometer2"></i> 仪表盘
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/agents}">
                            <i class="bi bi-robot"></i> Agents
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/projects}">
                            <i class="bi bi-folder"></i> 项目
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/admin/users}">
                            <i class="bi bi-people"></i> 用户管理
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span th:text="${username}">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <button class="dropdown-item" type="submit">
                                        <i class="bi bi-box-arrow-right"></i> 退出登录
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-folder"></i> 项目管理</h2>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#createProjectModal">
                <i class="bi bi-plus-circle"></i> 创建项目
            </button>
        </div>

        <!-- Project List -->
        <div class="row">
            <div th:each="project : ${projects}" class="col-md-4 mb-4">
                <div class="card bg-dark border-secondary h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0" th:text="${project.name}"></h5>
                        <span class="badge bg-primary" th:text="${project.status}"></span>
                    </div>
                    <div class="card-body">
                        <p><strong>描述：</strong><span th:text="${project.description ?: '无'}"></span></p>
                        <p><strong>工作目录：</strong><br>
                            <code th:text="${project.workDir}"></code>
                        </p>
                        <p><strong>Agent 数：</strong><span th:text="${project.agentIds.size()}">0</span></p>
                        <p><strong>创建时间：</strong><br>
                            <small th:text="${#temporals.format(project.createdAt, 'yyyy-MM-dd HH:mm')}"></small>
                        </p>
                    </div>
                    <div class="card-footer">
                        <a th:href="@{/projects/{id}(id=${project.id})}" class="btn btn-primary btn-sm">
                            <i class="bi bi-eye"></i> 详情
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(projects)}" class="text-center py-5">
            <i class="bi bi-folder-x" style="font-size: 4rem; opacity: 0.5;"></i>
            <h4 class="mt-3">暂无项目</h4>
            <p class="text-muted">点击上方按钮创建第一个项目</p>
        </div>
    </div>

    <!-- Create Project Modal -->
    <div class="modal fade" id="createProjectModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title"><i class="bi bi-plus-circle"></i> 创建项目</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/projects/create}" method="post">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">项目名称 *</label>
                            <input type="text" class="form-control bg-dark text-light border-secondary"
                                   name="name" required placeholder="输入项目名称">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">工作目录 *</label>
                            <input type="text" class="form-control bg-dark text-light border-secondary"
                                   name="workDir" required placeholder="输入绝对路径，如 /path/to/game">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">描述</label>
                            <textarea class="form-control bg-dark text-light border-secondary"
                                      name="description" rows="3" placeholder="项目描述（可选）"></textarea>
                        </div>
                    </div>
                    <div class="modal-footer border-secondary">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-circle"></i> 创建
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
