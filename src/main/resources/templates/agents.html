<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agents - ChengXun Game Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">
                <i class="bi bi-controller"></i> ChengXun Game Maker
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">
                            <i class="bi bi-speedometer2"></i> 仪表盘
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/agents}">
                            <i class="bi bi-robot"></i> Agents
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/projects}">
                            <i class="bi bi-folder"></i> 项目
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/skills}">
                            <i class="bi bi-lightning"></i> 技能
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/tokens}">
                            <i class="bi bi-key"></i> Token 管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/monitor}">
                            <i class="bi bi-graph-up"></i> 监控
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/admin/users}">
                            <i class="bi bi-people"></i> 用户管理
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAuthority('PERM_roles:manage')">
                        <a class="nav-link" th:href="@{/roles}">
                            <i class="bi bi-shield-lock"></i> 角色管理
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span th:text="${username}">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                            <li>
                                <a class="dropdown-item" th:href="@{/profile}">
                                    <i class="bi bi-person"></i> 个人中心
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <button class="dropdown-item" type="submit">
                                        <i class="bi bi-box-arrow-right"></i> 退出登录
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-robot"></i> Agent 管理</h2>
        </div>

        <!-- Alerts -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- 无项目提示 -->
        <div th:if="${#lists.isEmpty(projects)}" class="text-center py-5">
            <i class="bi bi-folder-x" style="font-size: 3rem; color: #6c757d;"></i>
            <h4 class="mt-3 text-muted">暂无项目</h4>
            <p class="text-muted">请先创建项目，然后才能管理 Agent</p>
            <a th:href="@{/projects}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> 前往项目管理
            </a>
        </div>

        <div th:if="${!#lists.isEmpty(projects)}" class="row">
            <div th:each="agent : ${agents}" class="col-md-4 mb-4">
                <div class="card bg-dark border-secondary h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0" th:text="${agent.name}"></h5>
                        <span th:class="${agent.alive ? 'badge bg-success' : 'badge bg-danger'}"
                              th:text="${agent.alive ? '在线' : '离线'}"></span>
                    </div>
                    <div class="card-body">
                        <p><strong>角色：</strong><span class="badge bg-secondary" th:text="${agent.role}"></span></p>
                        <p><strong>状态：</strong>
                            <span th:if="${agent.busy}" class="badge bg-warning">忙碌</span>
                            <span th:unless="${agent.busy}" class="badge bg-success">空闲</span>
                        </p>
                        <p><strong>工作目录：</strong><br>
                            <code th:text="${agent.definition.workDir ?: '未设置'}"></code>
                        </p>
                        <p><strong>任务数：</strong><span th:text="${agent.tasks.size()}">0</span></p>
                        <p><strong>推理深度：</strong>
                            <span class="badge bg-info">
                                <i class="bi bi-brain"></i>
                                <span th:text="${agent.definition.reasoningDepth} + ' - ' + T(com.chengxun.gamemaker.model.AgentDefinition).getReasoningDepthLabel(agent.definition.reasoningDepth)"></span>
                            </span>
                        </p>
                    </div>
                    <div class="card-footer d-flex gap-2">
                        <a th:href="@{/agents/{id}(id=${agent.id})}" class="btn btn-primary btn-sm">
                            <i class="bi bi-eye"></i> 详情
                        </a>
                        <form th:unless="${agent.alive}"
                              th:action="@{/agents/{id}/start(id=${agent.id})}" method="post"
                              style="display: inline;" sec:authorize="hasAuthority('PERM_agents:manage')">
                            <button type="submit" class="btn btn-sm btn-success">
                                <i class="bi bi-play"></i> 启动
                            </button>
                        </form>
                        <form th:if="${agent.alive}"
                              th:action="@{/agents/{id}/stop(id=${agent.id})}" method="post"
                              style="display: inline;" sec:authorize="hasAuthority('PERM_agents:manage')">
                            <button type="submit" class="btn btn-sm btn-danger">
                                <i class="bi bi-stop"></i> 停止
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
