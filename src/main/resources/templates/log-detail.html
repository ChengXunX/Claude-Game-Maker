<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日志详情 - ChengXun Game Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
    <style>
        .log-container {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.85rem;
            line-height: 1.5;
        }
        .log-original {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 600px;
            overflow-y: auto;
        }
        .json-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            max-height: 600px;
            overflow-y: auto;
        }
        .json-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 0.75rem;
            overflow: hidden;
        }
        .json-item-header {
            background: var(--bg-tertiary);
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }
        .json-item-header:hover {
            background: var(--accent-color);
            color: white;
        }
        .json-item-header .badge {
            font-size: 0.7em;
        }
        .json-item-content {
            padding: 0.75rem;
            display: none;
        }
        .json-item-content.show {
            display: block;
        }
        .json-tree {
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.8rem;
            line-height: 1.6;
        }
        .json-key {
            color: #e83e8c;
        }
        .json-string {
            color: #28a745;
        }
        .json-number {
            color: #007bff;
        }
        .json-boolean {
            color: #fd7e14;
        }
        .json-null {
            color: #6c757d;
        }
        .json-bracket {
            color: #6c757d;
        }
        .json-toggle {
            cursor: pointer;
            user-select: none;
        }
        .json-toggle::before {
            content: '▼';
            display: inline-block;
            margin-right: 4px;
            transition: transform 0.2s;
        }
        .json-toggle.collapsed::before {
            transform: rotate(-90deg);
        }
        .json-collapsible {
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .json-collapsible.collapsed {
            max-height: 0;
        }
        .highlight-match {
            background: rgba(255, 193, 7, 0.3);
            border-radius: 2px;
            padding: 0 2px;
        }
        .json-selector {
            position: sticky;
            top: 0;
            background: var(--bg-card);
            z-index: 10;
            padding: 0.5rem 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 0.5rem;
        }
        .json-selector .form-check {
            margin-bottom: 0.25rem;
        }
        .json-selector .form-check-input:checked + .form-check-label {
            color: var(--accent-color);
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-dark text-light">
    <div class="container-fluid mt-4">
        <!-- 面包屑导航 -->
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item">
                    <a th:href="@{/admin/agent-logs}" class="text-decoration-none">
                        <i class="bi bi-journal-text"></i> Agent日志
                    </a>
                </li>
                <li class="breadcrumb-item active">日志详情</li>
            </ol>
        </nav>

        <!-- 日志基本信息 -->
        <div class="card mb-4">
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <h4 class="mb-3">
                            <span class="badge" th:classappend="'bg-' + (${log.level} == 'ERROR' ? 'danger' : (${log.level} == 'WARN' ? 'warning' : (${log.level} == 'INFO' ? 'info' : 'secondary')))"
                                  th:text="${log.level}">INFO</span>
                            <span th:text="${log.action}">ACTION</span>
                        </h4>
                        <p class="text-muted mb-2">
                            <i class="bi bi-robot"></i>
                            <strong th:text="${log.agentName}">Agent Name</strong>
                            <span class="ms-2" th:text="'(' + ${log.agentId} + ')'">(agent-id)</span>
                        </p>
                        <p class="text-muted mb-2">
                            <i class="bi bi-clock"></i>
                            <span th:text="${#temporals.format(log.createdAt, 'yyyy-MM-dd HH:mm:ss')}">2024-01-01 00:00:00</span>
                        </p>
                        <p class="text-muted mb-0" th:if="${log.taskId}">
                            <i class="bi bi-list-task"></i>
                            任务ID: <code th:text="${log.taskId}">task-id</code>
                        </p>
                    </div>
                    <div class="col-md-6">
                        <div th:if="${log.summary}">
                            <h6>摘要</h6>
                            <p th:text="${log.summary}">日志摘要</p>
                        </div>
                        <div th:if="${log.durationMs}">
                            <span class="badge bg-secondary">
                                <i class="bi bi-stopwatch"></i>
                                耗时: <span th:text="${log.durationMs}">0</span>ms
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 日志详情 - 左右分栏 -->
        <div class="row">
            <!-- 左侧：原始日志 -->
            <div class="col-lg-6">
                <div class="card mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-file-text"></i> 原始日志</h5>
                        <button class="btn btn-outline-secondary btn-sm" onclick="copyOriginal()">
                            <i class="bi bi-clipboard"></i> 复制
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <div class="log-original log-container" id="logOriginal">
                            <span th:if="${log.detail}" th:text="${log.detail}">日志详情</span>
                            <span th:unless="${log.detail}" class="text-muted">无详情</span>
                        </div>
                    </div>
                </div>

                <!-- 决策信息 -->
                <div class="card mb-4" th:if="${log.decision}">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-lightbulb"></i> 决策信息</h5>
                    </div>
                    <div class="card-body">
                        <pre class="mb-0" th:text="${log.decision}">决策内容</pre>
                    </div>
                </div>
            </div>

            <!-- 右侧：JSON格式化 -->
            <div class="col-lg-6">
                <div class="card mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="bi bi-braces"></i> JSON识别结果</h5>
                        <div>
                            <span class="badge bg-info" id="jsonCount">0个JSON</span>
                            <button class="btn btn-outline-secondary btn-sm ms-2" onclick="expandAllJson()">
                                <i class="bi bi-arrows-expand"></i> 全部展开
                            </button>
                            <button class="btn btn-outline-secondary btn-sm" onclick="collapseAllJson()">
                                <i class="bi bi-arrows-collapse"></i> 全部收缩
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <!-- JSON选择器 -->
                        <div class="json-selector" id="jsonSelector" style="display: none;">
                            <h6 class="mb-2">识别到的JSON：</h6>
                            <div id="jsonCheckboxes">
                                <!-- 动态生成 -->
                            </div>
                        </div>

                        <!-- JSON内容 -->
                        <div class="json-panel" id="jsonPanel">
                            <div id="jsonContent">
                                <div class="text-center text-muted py-4">
                                    <i class="bi bi-search fs-1"></i>
                                    <p class="mt-2">正在识别JSON...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 日志内容
        const logContent = [[${log.detail}]] || '';
        const logDecision = [[${log.decision}]] || '';
        const fullContent = logContent + '\n' + logDecision;

        // 识别到的JSON对象
        let identifiedJsons = [];

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            identifyAndFormatJson();
        });

        // 识别并格式化JSON
        function identifyAndFormatJson() {
            identifiedJsons = [];

            // 正则匹配JSON对象和数组
            const jsonRegex = /(\{[\s\S]*?\}|\[[\s\S]*?\])/g;
            let match;
            let index = 0;

            while ((match = jsonRegex.exec(fullContent)) !== null) {
                try {
                    const jsonStr = match[0];
                    const parsed = JSON.parse(jsonStr);

                    identifiedJsons.push({
                        index: index,
                        raw: jsonStr,
                        parsed: parsed,
                        start: match.index,
                        end: match.index + jsonStr.length,
                        type: Array.isArray(parsed) ? 'array' : 'object'
                    });

                    index++;
                } catch (e) {
                    // 不是有效的JSON，跳过
                }
            }

            // 更新UI
            updateJsonCount();
            updateJsonSelector();
            renderJsonContent();
        }

        // 更新JSON计数
        function updateJsonCount() {
            const badge = document.getElementById('jsonCount');
            badge.textContent = `${identifiedJsons.length}个JSON`;
            badge.className = identifiedJsons.length > 0 ? 'badge bg-success' : 'badge bg-secondary';
        }

        // 更新JSON选择器
        function updateJsonSelector() {
            const selector = document.getElementById('jsonSelector');
            const checkboxes = document.getElementById('jsonCheckboxes');

            if (identifiedJsons.length === 0) {
                selector.style.display = 'none';
                return;
            }

            selector.style.display = 'block';
            checkboxes.innerHTML = '';

            identifiedJsons.forEach((json, index) => {
                const preview = JSON.stringify(json.parsed).substring(0, 80) + (JSON.stringify(json.parsed).length > 80 ? '...' : '');

                const div = document.createElement('div');
                div.className = 'form-check';
                div.innerHTML = `
                    <input class="form-check-input" type="checkbox" id="jsonCheck${index}"
                           checked onchange="toggleJsonVisibility(${index})">
                    <label class="form-check-label" for="jsonCheck${index}">
                        <span class="badge ${json.type === 'array' ? 'bg-info' : 'bg-primary'} me-1">
                            ${json.type === 'array' ? '数组' : '对象'}
                        </span>
                        <code class="small">${escapeHtml(preview)}</code>
                    </label>
                `;
                checkboxes.appendChild(div);
            });
        }

        // 渲染JSON内容
        function renderJsonContent() {
            const container = document.getElementById('jsonContent');

            if (identifiedJsons.length === 0) {
                container.innerHTML = `
                    <div class="text-center text-muted py-4">
                        <i class="bi bi-check-circle fs-1"></i>
                        <p class="mt-2">未识别到有效的JSON</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = '';

            identifiedJsons.forEach((json, index) => {
                const item = document.createElement('div');
                item.className = 'json-item';
                item.id = `jsonItem${index}`;

                const header = document.createElement('div');
                header.className = 'json-item-header';
                header.onclick = () => toggleJsonItem(index);
                header.innerHTML = `
                    <div>
                        <span class="badge ${json.type === 'array' ? 'bg-info' : 'bg-primary'} me-2">
                            ${json.type === 'array' ? '数组' : '对象'}
                        </span>
                        <span class="text-muted small">JSON #${index + 1}</span>
                    </div>
                    <div>
                        <span class="badge bg-secondary me-2">${countKeys(json.parsed)}个键</span>
                        <i class="bi bi-chevron-down" id="jsonIcon${index}"></i>
                    </div>
                `;

                const content = document.createElement('div');
                content.className = 'json-item-content show';
                content.id = `jsonContent${index}`;
                content.innerHTML = `<div class="json-tree">${renderJsonTree(json.parsed, 0)}</div>`;

                item.appendChild(header);
                item.appendChild(content);
                container.appendChild(item);
            });
        }

        // 渲染JSON树
        function renderJsonTree(obj, depth, isLast = true) {
            if (obj === null) {
                return `<span class="json-null">null</span>${isLast ? '' : ','}`;
            }

            if (typeof obj === 'string') {
                return `<span class="json-string">"${escapeHtml(obj)}"</span>${isLast ? '' : ','}`;
            }

            if (typeof obj === 'number') {
                return `<span class="json-number">${obj}</span>${isLast ? '' : ','}`;
            }

            if (typeof obj === 'boolean') {
                return `<span class="json-boolean">${obj}</span>${isLast ? '' : ','}`;
            }

            if (Array.isArray(obj)) {
                if (obj.length === 0) {
                    return `<span class="json-bracket">[]</span>${isLast ? '' : ','}`;
                }

                const id = `arr_${depth}_${Math.random().toString(36).substr(2, 9)}`;
                let html = `<span class="json-toggle" onclick="toggleCollapse('${id}')"></span>`;
                html += `<span class="json-bracket">[</span>`;
                html += `<div class="json-collapsible" id="${id}">`;

                obj.forEach((item, index) => {
                    html += `<div style="padding-left: 20px;">${renderJsonTree(item, depth + 1, index === obj.length - 1)}</div>`;
                });

                html += `</div>`;
                html += `<span class="json-bracket">]</span>${isLast ? '' : ','}`;
                return html;
            }

            if (typeof obj === 'object') {
                const keys = Object.keys(obj);
                if (keys.length === 0) {
                    return `<span class="json-bracket">{}</span>${isLast ? '' : ','}`;
                }

                const id = `obj_${depth}_${Math.random().toString(36).substr(2, 9)}`;
                let html = `<span class="json-toggle" onclick="toggleCollapse('${id}')"></span>`;
                html += `<span class="json-bracket">{</span>`;
                html += `<div class="json-collapsible" id="${id}">`;

                keys.forEach((key, index) => {
                    const value = obj[key];
                    html += `<div style="padding-left: 20px;">`;
                    html += `<span class="json-key">"${escapeHtml(key)}"</span>: `;
                    html += renderJsonTree(value, depth + 1, index === keys.length - 1);
                    html += `</div>`;
                });

                html += `</div>`;
                html += `<span class="json-bracket">}</span>${isLast ? '' : ','}`;
                return html;
            }

            return String(obj);
        }

        // 计算对象键数量
        function countKeys(obj) {
            if (Array.isArray(obj)) {
                return obj.length;
            }
            if (typeof obj === 'object' && obj !== null) {
                return Object.keys(obj).length;
            }
            return 0;
        }

        // 切换JSON项展开/收缩
        function toggleJsonItem(index) {
            const content = document.getElementById(`jsonContent${index}`);
            const icon = document.getElementById(`jsonIcon${index}`);

            content.classList.toggle('show');
            icon.className = content.classList.contains('show') ? 'bi bi-chevron-down' : 'bi bi-chevron-right';
        }

        // 切换JSON节点展开/收缩
        function toggleCollapse(id) {
            const element = document.getElementById(id);
            const toggle = element.previousElementSibling;

            element.classList.toggle('collapsed');
            toggle.classList.toggle('collapsed');
        }

        // 切换JSON可见性
        function toggleJsonVisibility(index) {
            const checkbox = document.getElementById(`jsonCheck${index}`);
            const item = document.getElementById(`jsonItem${index}`);

            item.style.display = checkbox.checked ? 'block' : 'none';
        }

        // 展开所有JSON
        function expandAllJson() {
            document.querySelectorAll('.json-item-content').forEach(el => {
                el.classList.add('show');
            });
            document.querySelectorAll('[id^="jsonIcon"]').forEach(el => {
                el.className = 'bi bi-chevron-down';
            });
            document.querySelectorAll('.json-collapsible').forEach(el => {
                el.classList.remove('collapsed');
            });
            document.querySelectorAll('.json-toggle').forEach(el => {
                el.classList.remove('collapsed');
            });
        }

        // 收缩所有JSON
        function collapseAllJson() {
            document.querySelectorAll('.json-item-content').forEach(el => {
                el.classList.remove('show');
            });
            document.querySelectorAll('[id^="jsonIcon"]').forEach(el => {
                el.className = 'bi bi-chevron-right';
            });
        }

        // 复制原始日志
        function copyOriginal() {
            const text = document.getElementById('logOriginal').textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制到剪贴板');
            }).catch(err => {
                console.error('复制失败:', err);
            });
        }

        // 转义HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
