<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待审核用户 - ChengXun Game Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">
                <i class="bi bi-controller"></i> ChengXun Game Maker
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">
                            <i class="bi bi-speedometer2"></i> 仪表盘
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/agents}">
                            <i class="bi bi-robot"></i> Agents
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/projects}">
                            <i class="bi bi-folder"></i> 项目
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/skills}">
                            <i class="bi bi-lightning"></i> 技能
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/tokens}">
                            <i class="bi bi-key"></i> Token 管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/monitor}">
                            <i class="bi bi-graph-up"></i> 监控
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/admin/users}">
                            <i class="bi bi-people"></i> 用户管理
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAuthority('PERM_roles:manage')">
                        <a class="nav-link" th:href="@{/roles}">
                            <i class="bi bi-shield-lock"></i> 角色管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/settings}">
                            <i class="bi bi-gear"></i> 设置
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span th:text="${username}">Admin</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                            <li>
                                <a class="dropdown-item" th:href="@{/profile}">
                                    <i class="bi bi-person"></i> 个人中心
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <button class="dropdown-item" type="submit">
                                        <i class="bi bi-box-arrow-right"></i> 退出登录
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">首页</a></li>
                <li class="breadcrumb-item"><a th:href="@{/admin/users}" class="text-decoration-none">用户管理</a></li>
                <li class="breadcrumb-item active">待审核</li>
            </ol>
        </nav>

        <h2 class="mb-4"><i class="bi bi-person-clock"></i> 待审核用户</h2>

        <div th:if="${#lists.isEmpty(pendingUsers)}" class="text-center py-5">
            <i class="bi bi-check-circle" style="font-size: 4rem; opacity: 0.5; color: #198754;"></i>
            <h4 class="mt-3">没有待审核的用户</h4>
            <p class="text-muted">所有注册请求已处理</p>
        </div>

        <div class="row">
            <div th:each="user : ${pendingUsers}" class="col-md-4 mb-4">
                <div class="card bg-dark border-warning">
                    <div class="card-header bg-warning text-dark">
                        <h5 class="mb-0"><i class="bi bi-person"></i> <span th:text="${user.username}"></span></h5>
                    </div>
                    <div class="card-body">
                        <p><strong>昵称：</strong><span th:text="${user.nickname ?: '-'}"></span></p>
                        <p><strong>邮箱：</strong><span th:text="${user.email ?: '-'}"></span></p>
                        <p><strong>注册时间：</strong><br>
                            <small th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></small>
                        </p>
                    </div>
                    <div class="card-footer d-flex gap-2">
                        <form th:action="@{/admin/users/{id}/approve(id=${user.id})}" method="post" class="flex-grow-1">
                            <button type="submit" class="btn btn-success w-100">
                                <i class="bi bi-check-circle"></i> 批准
                            </button>
                        </form>
                        <form th:action="@{/admin/users/{id}/reject(id=${user.id})}" method="post" class="flex-grow-1">
                            <button type="submit" class="btn btn-danger w-100">
                                <i class="bi bi-x-circle"></i> 拒绝
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
