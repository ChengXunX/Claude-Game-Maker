<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统配置 - ChengXun Game Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">
                <i class="bi bi-controller"></i> ChengXun Game Maker
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">
                            <i class="bi bi-speedometer2"></i> 仪表盘
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/agents}">
                            <i class="bi bi-robot"></i> Agents
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/projects}">
                            <i class="bi bi-folder"></i> 项目
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/skills}">
                            <i class="bi bi-lightning"></i> 技能
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/tokens}">
                            <i class="bi bi-key"></i> Token 管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/monitor}">
                            <i class="bi bi-graph-up"></i> 监控
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/admin/users}">
                            <i class="bi bi-people"></i> 用户管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/admin/configs}">
                            <i class="bi bi-gear"></i> 系统配置
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAuthority('PERM_roles:manage')">
                        <a class="nav-link" th:href="@{/roles}">
                            <i class="bi bi-shield-lock"></i> 角色管理
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span th:text="${username}">Admin</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                            <li>
                                <a class="dropdown-item" th:href="@{/profile}">
                                    <i class="bi bi-person"></i> 个人中心
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <button class="dropdown-item" type="submit">
                                        <i class="bi bi-box-arrow-right"></i> 退出登录
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">首页</a></li>
                <li class="breadcrumb-item active">系统配置</li>
            </ol>
        </nav>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-gear"></i> 系统配置</h2>
            <div>
                <a th:href="@{/admin/configs/create}" class="btn btn-primary me-2">
                    <i class="bi bi-plus-circle"></i> 添加配置
                </a>
                <form th:action="@{/admin/configs/refresh}" method="post" style="display: inline;">
                    <button type="submit" class="btn btn-outline-info">
                        <i class="bi bi-arrow-clockwise"></i> 刷新缓存
                    </button>
                </form>
            </div>
        </div>

        <!-- Alerts -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- 分组过滤 -->
        <div class="mb-4">
            <div class="btn-group" role="group">
                <a th:href="@{/admin/configs}" class="btn"
                   th:classappend="${selectedGroup == null ? 'btn-primary' : 'btn-outline-primary'}">
                    全部
                </a>
                <a th:each="g : ${groups}" th:href="@{/admin/configs(group=${g})}" class="btn"
                   th:classappend="${selectedGroup == g ? 'btn-primary' : 'btn-outline-primary'}"
                   th:text="${g}">
                </a>
            </div>
        </div>

        <!-- 配置列表 -->
        <div class="card bg-dark border-secondary">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-dark table-hover">
                        <thead>
                            <tr>
                                <th>配置键</th>
                                <th>配置值</th>
                                <th>描述</th>
                                <th>分组</th>
                                <th>类型</th>
                                <th>系统内置</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="config : ${configs}">
                                <td>
                                    <code th:text="${config.configKey}"></code>
                                </td>
                                <td>
                                    <span th:text="${config.configValue}" class="text-truncate" style="max-width: 200px; display: inline-block;"></span>
                                </td>
                                <td>
                                    <small th:text="${config.description ?: '-'}"></small>
                                </td>
                                <td>
                                    <span class="badge bg-secondary" th:text="${config.group}"></span>
                                </td>
                                <td>
                                    <span class="badge bg-info" th:text="${config.valueType}"></span>
                                </td>
                                <td>
                                    <span th:if="${config.systemBuiltin}" class="badge bg-warning">
                                        <i class="bi bi-lock"></i> 是
                                    </span>
                                    <span th:unless="${config.systemBuiltin}" class="badge bg-success">否</span>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/admin/configs/{id}/edit(id=${config.id})}"
                                           class="btn btn-outline-primary">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <form th:unless="${config.systemBuiltin}"
                                              th:action="@{/admin/configs/{id}/delete(id=${config.id})}" method="post"
                                              style="display: inline;"
                                              onsubmit="return confirm('确定要删除此配置吗？')">
                                            <button type="submit" class="btn btn-outline-danger">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <p th:if="${#lists.isEmpty(configs)}" class="text-muted text-center py-3">
                    暂无配置项
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
