<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>已安装 - ChengXun Game Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; }
    </style>
</head>
<body class="d-flex align-items-center">
    <div class="container text-center">
        <div class="card bg-dark border-secondary" style="max-width: 500px; margin: 0 auto;">
            <div class="card-body p-5">
                <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                <h3 class="text-light mt-3">系统已安装</h3>
                <p class="text-muted" th:text="${error} ?: 'ChengXun Game Maker 已完成安装，无需重复操作。'"></p>
                <a href="/login" class="btn btn-primary mt-3">
                    <i class="bi bi-box-arrow-in-right"></i> 前往登录
                </a>
            </div>
        </div>
    </div>
</body>
</html>
