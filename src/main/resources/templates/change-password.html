<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>修改密码 - ChengXun Game Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .password-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #0d6efd;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        .captcha-img {
            cursor: pointer;
            border-radius: 5px;
            height: 44px;
        }
        .password-requirements {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.7);
        }
        .password-requirements li {
            margin-bottom: 4px;
        }
        .password-requirements li.valid {
            color: #28a745;
        }
        .password-requirements li.invalid {
            color: #dc3545;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock text-warning" style="font-size: 3rem;"></i>
                    <h2 class="text-white mt-2">修改密码</h2>
                    <p th:if="${forced}" class="text-warning">
                        <i class="bi bi-exclamation-triangle"></i>
                        首次登录，请修改默认密码以确保账户安全
                    </p>
                </div>

                <div class="password-card p-4">
                    <div th:if="${error}" class="alert alert-danger">
                        <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
                    </div>
                    <div th:if="${success}" class="alert alert-success">
                        <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
                    </div>

                    <form th:action="@{/profile/password}" method="post">
                        <div class="mb-3">
                            <label class="form-label text-light">当前密码</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent text-light border-end-0">
                                    <i class="bi bi-lock"></i>
                                </span>
                                <input type="password" class="form-control border-start-0" name="currentPassword"
                                       placeholder="请输入当前密码" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">新密码</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent text-light border-end-0">
                                    <i class="bi bi-key"></i>
                                </span>
                                <input type="password" class="form-control border-start-0" name="newPassword"
                                       placeholder="请输入新密码" required minlength="8" id="newPassword"
                                       oninput="checkPasswordStrength()">
                            </div>
                            <ul class="password-requirements mt-2" id="passwordRequirements">
                                <li id="req-length"><i class="bi bi-circle"></i> 至少8个字符</li>
                                <li id="req-upper"><i class="bi bi-circle"></i> 包含大写字母</li>
                                <li id="req-lower"><i class="bi bi-circle"></i> 包含小写字母</li>
                                <li id="req-digit"><i class="bi bi-circle"></i> 包含数字</li>
                                <li id="req-special"><i class="bi bi-circle"></i> 包含特殊字符（!@#$%^&*()）</li>
                            </ul>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">确认新密码</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent text-light border-end-0">
                                    <i class="bi bi-key-fill"></i>
                                </span>
                                <input type="password" class="form-control border-start-0" name="confirmPassword"
                                       placeholder="请再次输入新密码" required minlength="8">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label text-light">验证码</label>
                            <div class="input-group">
                                <input type="text" class="form-control" name="captchaCode"
                                       placeholder="请输入验证码" required maxlength="5"
                                       style="max-width: 120px;">
                                <input type="hidden" name="captchaId" th:value="${captchaId}">
                                <img th:src="${captchaImage}" class="captcha-img ms-2" id="captchaImg"
                                     onclick="refreshCaptcha()" title="点击刷新验证码">
                                <button type="button" class="btn btn-outline-light btn-sm ms-1"
                                        onclick="refreshCaptcha()" title="刷新验证码">
                                    <i class="bi bi-arrow-clockwise"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="bi bi-check-circle"></i> 修改密码
                        </button>
                    </form>

                    <div th:unless="${forced}" class="text-center">
                        <a th:href="@{/profile}" class="text-light opacity-75 text-decoration-none">
                            <i class="bi bi-arrow-left"></i> 返回个人中心
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function refreshCaptcha() {
            fetch('/captcha/generate')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('captchaImg').src = data.image;
                    document.querySelector('input[name="captchaId"]').value = data.captchaId;
                });
        }

        function checkPasswordStrength() {
            const password = document.getElementById('newPassword').value;

            const requirements = {
                'req-length': password.length >= 8,
                'req-upper': /[A-Z]/.test(password),
                'req-lower': /[a-z]/.test(password),
                'req-digit': /\d/.test(password),
                'req-special': /[!@#$%^&*()]/.test(password)
            };

            for (const [id, met] of Object.entries(requirements)) {
                const li = document.getElementById(id);
                if (met) {
                    li.className = 'valid';
                    li.querySelector('i').className = 'bi bi-check-circle-fill';
                } else {
                    li.className = 'invalid';
                    li.querySelector('i').className = 'bi bi-circle';
                }
            }
        }
    </script>
</body>
</html>
