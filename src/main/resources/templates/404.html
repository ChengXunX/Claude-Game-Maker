<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面未找到 - ChengXun Game Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-container {
            text-align: center;
            padding: 40px;
        }
        .error-code {
            font-size: 120px;
            font-weight: bold;
            color: #4a9eff;
            text-shadow: 0 0 20px rgba(74, 158, 255, 0.5);
        }
        .error-message {
            font-size: 24px;
            color: #e6e6e6;
            margin: 20px 0;
        }
        .error-description {
            color: #adb5bd;
            margin-bottom: 30px;
        }
        .btn-home {
            background: #4a9eff;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .btn-home:hover {
            background: #3a8eef;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-code">404</div>
        <div class="error-message">页面未找到</div>
        <p class="error-description">
            抱歉，您访问的页面不存在或已被移除。
        </p>
        <a href="/" class="btn btn-home text-white">
            <i class="bi bi-house"></i> 返回首页
        </a>
        <a href="javascript:history.back()" class="btn btn-outline-light ms-3" style="padding: 12px 30px;">
            <i class="bi bi-arrow-left"></i> 返回上一页
        </a>
    </div>
</body>
</html>
