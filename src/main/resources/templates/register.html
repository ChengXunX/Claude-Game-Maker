<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - ChengXun Game Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #0d6efd;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-controller text-primary" style="font-size: 3rem;"></i>
                    <h2 class="text-white mt-2">注册账号</h2>
                    <p class="text-light opacity-75">注册后需等待管理员审核</p>
                </div>

                <div class="register-card p-4">
                    <div th:if="${error}" class="alert alert-danger">
                        <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
                    </div>

                    <form th:action="@{/register}" method="post">
                        <div class="mb-3">
                            <label class="form-label text-light">用户名 *</label>
                            <input type="text" class="form-control" name="username"
                                   placeholder="3-50个字符" required minlength="3" maxlength="50">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-light">密码 *</label>
                            <input type="password" class="form-control" name="password"
                                   placeholder="至少6个字符" required minlength="6">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-light">邮箱</label>
                            <input type="email" class="form-control" name="email"
                                   placeholder="可选">
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-light">昵称</label>
                            <input type="text" class="form-control" name="nickname"
                                   placeholder="可选，默认为用户名">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="bi bi-person-plus"></i> 注册
                        </button>
                    </form>

                    <div class="text-center">
                        <a th:href="@{/login}" class="text-light opacity-75 text-decoration-none">
                            已有账号？<span class="text-primary">立即登录</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
