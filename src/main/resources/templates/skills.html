<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技能管理 - ChengXun Game Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">
                <i class="bi bi-controller"></i> ChengXun Game Maker
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">
                            <i class="bi bi-speedometer2"></i> 仪表盘
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/agents}">
                            <i class="bi bi-robot"></i> Agents
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/projects}">
                            <i class="bi bi-folder"></i> 项目
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/skills}">
                            <i class="bi bi-lightning"></i> 技能
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/tokens}">
                            <i class="bi bi-key"></i> Token 管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/monitor}">
                            <i class="bi bi-graph-up"></i> 监控
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/admin/users}">
                            <i class="bi bi-people"></i> 用户管理
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAuthority('PERM_roles:manage')">
                        <a class="nav-link" th:href="@{/roles}">
                            <i class="bi bi-shield-lock"></i> 角色管理
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span th:text="${username}">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                            <li>
                                <a class="dropdown-item" th:href="@{/profile}">
                                    <i class="bi bi-person"></i> 个人中心
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <button class="dropdown-item" type="submit">
                                        <i class="bi bi-box-arrow-right"></i> 退出登录
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-lightning"></i> 技能管理</h2>
            <div>
                <span class="badge bg-info fs-6 me-2" th:text="'共 ' + ${globalCount} + ' 个技能'">0</span>
                <a th:href="@{/skills/create}" class="btn btn-primary" sec:authorize="hasAuthority('PERM_skills:manage')">
                    <i class="bi bi-plus-circle"></i> 创建技能
                </a>
            </div>
        </div>

        <!-- Alerts -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Skills Grid -->
        <div class="row">
            <div th:each="skill : ${globalSkills}" class="col-md-4 col-lg-3 mb-4">
                <div class="card bg-dark border-secondary h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h6 class="mb-0 text-truncate" th:text="${skill.name}" th:title="${skill.name}"></h6>
                        <span class="badge" th:classappend="${skill.category == 'builtin' ? 'bg-primary' : (skill.category == 'learned' ? 'bg-success' : 'bg-secondary')}"
                              th:text="${skill.category}"></span>
                    </div>
                    <div class="card-body">
                        <p class="small text-muted mb-2" th:text="${skill.description} ?: '无描述'"></p>
                        <div class="mb-2">
                            <small class="text-muted">触发关键词：</small><br>
                            <code class="small" th:text="${skill.triggerPattern} ?: '-'"></code>
                        </div>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="badge bg-info">
                                <i class="bi bi-bar-chart"></i> 使用 <span th:text="${skill.usageCount}">0</span> 次
                            </span>
                            <small class="text-muted" th:if="${skill.lastUsedAt}"
                                   th:text="'上次: ' + ${#temporals.format(skill.lastUsedAt, 'MM-dd HH:mm')}"></small>
                        </div>
                    </div>
                    <div class="card-footer d-flex gap-2">
                        <a th:href="@{/skills/{id}(id=${skill.id})}" class="btn btn-sm btn-outline-primary flex-fill">
                            <i class="bi bi-eye"></i> 详情
                        </a>
                        <a th:unless="${skill.category == 'builtin'}"
                           th:href="@{/skills/{id}/edit(id=${skill.id})}"
                           class="btn btn-sm btn-outline-warning" sec:authorize="hasAuthority('PERM_skills:manage')">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <form th:unless="${skill.category == 'builtin'}"
                              th:action="@{/skills/{id}/delete(id=${skill.id})}" method="post"
                              style="display: inline;"
                              onsubmit="return confirm('确定要删除此技能吗？')"
                              sec:authorize="hasAuthority('PERM_skills:manage')">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(globalSkills)}" class="text-center py-5">
            <i class="bi bi-lightning-charge" style="font-size: 4rem; opacity: 0.5;"></i>
            <h4 class="mt-3">暂无技能</h4>
            <p class="text-muted">系统将在 Agent 学习过程中自动创建技能</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
