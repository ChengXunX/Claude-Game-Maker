<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'流水线详情 - ' + ${pipeline.pipelineNo}">流水线详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <div class="container-fluid mt-4">
        <!-- 面包屑导航 -->
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/pipelines}" class="text-light">流水线</a></li>
                <li class="breadcrumb-item active" th:text="${pipeline.pipelineNo}">PL-001</li>
            </ol>
        </nav>

        <div class="row">
            <!-- 左侧：流水线信息 -->
            <div class="col-md-4">
                <div class="card bg-dark mb-4">
                    <div class="card-header">
                        <i class="bi bi-info-circle"></i> 基本信息
                    </div>
                    <div class="card-body">
                        <table class="table table-dark table-borderless">
                            <tr>
                                <td class="text-muted">编号</td>
                                <td th:text="${pipeline.pipelineNo}">PL-001</td>
                            </tr>
                            <tr>
                                <td class="text-muted">名称</td>
                                <td th:text="${pipeline.name}">流水线名称</td>
                            </tr>
                            <tr>
                                <td class="text-muted">项目</td>
                                <td th:text="${pipeline.projectName}">项目名称</td>
                            </tr>
                            <tr>
                                <td class="text-muted">类型</td>
                                <td>
                                    <span class="badge bg-secondary" th:text="${pipeline.pipelineTypeDescription}">类型</span>
                                </td>
                            </tr>
                            <tr>
                                <td class="text-muted">状态</td>
                                <td>
                                    <span class="badge" th:classappend="${pipeline.status == 'SUCCESS' ? 'bg-success' :
                                        pipeline.status == 'RUNNING' ? 'bg-primary' :
                                        pipeline.status == 'FAILED' ? 'bg-danger' : 'bg-secondary'}"
                                        th:text="${pipeline.statusDescription}">状态</span>
                                </td>
                            </tr>
                            <tr th:if="${pipeline.autoTriggered}">
                                <td class="text-muted">触发方式</td>
                                <td>
                                    <span class="badge bg-info">自动触发</span>
                                </td>
                            </tr>
                            <tr th:if="${!pipeline.autoTriggered}">
                                <td class="text-muted">触发方式</td>
                                <td th:text="${pipeline.triggerType ?: '-'}">手动</td>
                            </tr>
                            <tr>
                                <td class="text-muted">触发人</td>
                                <td th:text="${pipeline.triggeredByName ?: '-'}">管理员</td>
                            </tr>
                            <tr th:if="${pipeline.productionDeploy}">
                                <td class="text-muted">环境</td>
                                <td><span class="badge bg-danger">生产环境</span></td>
                            </tr>
                            <tr th:if="${pipeline.requiresApproval}">
                                <td class="text-muted">审批状态</td>
                                <td>
                                    <span class="badge" th:classappend="${pipeline.approvalStatus == 'APPROVED' ? 'bg-success' :
                                        pipeline.approvalStatus == 'REJECTED' ? 'bg-danger' : 'bg-warning text-dark'}"
                                        th:text="${pipeline.approvalStatusDescription}">审批状态</span>
                                </td>
                            </tr>
                            <tr th:if="${pipeline.approvedByName}">
                                <td class="text-muted">审批人</td>
                                <td th:text="${pipeline.approvedByName}">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">开始时间</td>
                                <td th:text="${pipeline.startedAt ? #temporals.format(pipeline.startedAt, 'yyyy-MM-dd HH:mm:ss') : '-'}">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">完成时间</td>
                                <td th:text="${pipeline.completedAt ? #temporals.format(pipeline.completedAt, 'yyyy-MM-dd HH:mm:ss') : '-'}">-</td>
                            </tr>
                            <tr>
                                <td class="text-muted">耗时</td>
                                <td th:text="${pipeline.durationSeconds ? pipeline.durationSeconds + '秒' : '-'}">-</td>
                            </tr>
                        </table>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="card bg-dark mb-4">
                    <div class="card-header">
                        <i class="bi bi-gear"></i> 操作
                    </div>
                    <div class="card-body">
                        <div class="d-grid gap-2">
                            <!-- 直接触发执行（不需要审批） -->
                            <form th:if="${(pipeline.status == 'IDLE' || pipeline.status == 'SUCCESS' || pipeline.status == 'FAILED') && !pipeline.requiresApproval}"
                                  th:action="@{/pipelines/{id}/trigger(id=${pipeline.id})}" method="post">
                                <button type="submit" class="btn btn-success w-100">
                                    <i class="bi bi-play-circle"></i> 触发执行
                                </button>
                            </form>
                            <!-- 提交审批 -->
                            <form th:if="${(pipeline.status == 'IDLE' || pipeline.status == 'SUCCESS' || pipeline.status == 'FAILED') && pipeline.requiresApproval && pipeline.approvalStatus != 'APPROVED'}"
                                  th:action="@{/pipelines/{id}/submit-approval(id=${pipeline.id})}" method="post">
                                <button type="submit" class="btn btn-warning w-100">
                                    <i class="bi bi-check2-square"></i> 提交审批
                                </button>
                            </form>
                            <!-- 已批准后触发执行 -->
                            <form th:if="${pipeline.requiresApproval && pipeline.approvalStatus == 'APPROVED' && (pipeline.status == 'IDLE' || pipeline.status == 'SUCCESS' || pipeline.status == 'FAILED')}"
                                  th:action="@{/pipelines/{id}/trigger(id=${pipeline.id})}" method="post">
                                <button type="submit" class="btn btn-success w-100">
                                    <i class="bi bi-play-circle"></i> 触发执行
                                </button>
                            </form>
                            <!-- 审批操作（待审批状态） -->
                            <div th:if="${pipeline.requiresApproval && pipeline.approvalStatus == 'PENDING'}" class="card bg-secondary mb-2">
                                <div class="card-body">
                                    <h6 class="card-title">审批操作</h6>
                                    <form th:action="@{/pipelines/{id}/approve(id=${pipeline.id})}" method="post" class="mb-2">
                                        <input type="hidden" name="approved" value="true">
                                        <div class="mb-2">
                                            <input type="text" class="form-control form-control-sm bg-dark text-light"
                                                   name="comment" placeholder="审批备注（可选）">
                                        </div>
                                        <button type="submit" class="btn btn-success btn-sm w-100">
                                            <i class="bi bi-check-circle"></i> 批准
                                        </button>
                                    </form>
                                    <form th:action="@{/pipelines/{id}/approve(id=${pipeline.id})}" method="post">
                                        <input type="hidden" name="approved" value="false">
                                        <div class="mb-2">
                                            <input type="text" class="form-control form-control-sm bg-dark text-light"
                                                   name="comment" placeholder="拒绝原因（可选）">
                                        </div>
                                        <button type="submit" class="btn btn-danger btn-sm w-100"
                                                onclick="return confirm('确定要拒绝吗？')">
                                            <i class="bi bi-x-circle"></i> 拒绝
                                        </button>
                                    </form>
                                </div>
                            </div>
                            <!-- 暂停 -->
                            <form th:if="${pipeline.status == 'RUNNING'}"
                                  th:action="@{/pipelines/{id}/pause(id=${pipeline.id})}" method="post">
                                <button type="submit" class="btn btn-warning w-100">
                                    <i class="bi bi-pause-circle"></i> 暂停执行
                                </button>
                            </form>
                            <!-- 恢复 -->
                            <form th:if="${pipeline.status == 'PAUSED'}"
                                  th:action="@{/pipelines/{id}/resume(id=${pipeline.id})}" method="post">
                                <button type="submit" class="btn btn-success w-100">
                                    <i class="bi bi-play-circle"></i> 恢复执行
                                </button>
                            </form>
                            <!-- 取消 -->
                            <form th:if="${pipeline.isRunning() || pipeline.status == 'PAUSED'}"
                                  th:action="@{/pipelines/{id}/cancel(id=${pipeline.id})}" method="post">
                                <button type="submit" class="btn btn-danger w-100"
                                        onclick="return confirm('确定要取消执行吗？')">
                                    <i class="bi bi-stop-circle"></i> 取消执行
                                </button>
                            </form>
                            <a th:href="@{/pipelines}" class="btn btn-secondary w-100">
                                <i class="bi bi-arrow-left"></i> 返回列表
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：阶段和日志 -->
            <div class="col-md-8">
                <!-- 执行进度 -->
                <div class="card bg-dark mb-4" th:if="${pipeline.isRunning()}">
                    <div class="card-header">
                        <i class="bi bi-hourglass-split"></i> 执行进度
                    </div>
                    <div class="card-body">
                        <div class="progress mb-3" style="height: 30px;">
                            <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar"
                                 th:style="'width: ' + ${pipeline.progress} + '%'"
                                 th:text="${pipeline.progress} + '%'">
                            </div>
                        </div>
                        <p class="text-muted mb-0">
                            当前阶段: <strong th:text="${pipeline.currentStage ?: '-'}">-</strong>
                        </p>
                    </div>
                </div>

                <!-- 阶段列表 -->
                <div class="card bg-dark mb-4">
                    <div class="card-header">
                        <i class="bi bi-list-check"></i> 执行阶段
                    </div>
                    <div class="card-body">
                        <div class="list-group list-group-flush">
                            <div th:each="stage, iter : ${stages}"
                                 class="list-group-item bg-dark text-light d-flex justify-content-between align-items-center">
                                <div>
                                    <span class="badge me-2" th:text="${stage.stageOrder}">1</span>
                                    <strong th:text="${stage.name}">阶段名称</strong>
                                    <small class="text-muted ms-2" th:text="${stage.description}">描述</small>
                                </div>
                                <div>
                                    <span class="badge" th:classappend="${stage.status == 'SUCCESS' ? 'bg-success' :
                                        stage.status == 'RUNNING' ? 'bg-primary' :
                                        stage.status == 'FAILED' ? 'bg-danger' : 'bg-secondary'}"
                                        th:text="${stage.statusDescription}">状态</span>
                                    <small class="text-muted ms-2" th:if="${stage.durationSeconds}"
                                           th:text="${stage.durationSeconds} + 's'">0s</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 执行日志 -->
                <div class="card bg-dark">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-terminal"></i> 执行日志</span>
                        <button class="btn btn-sm btn-outline-secondary" onclick="refreshLogs()">
                            <i class="bi bi-arrow-clockwise"></i> 刷新
                        </button>
                    </div>
                    <div class="card-body">
                        <pre class="bg-black text-success p-3" style="max-height: 400px; overflow-y: auto;"
                             id="executionLog"
                             th:text="${pipeline.executionLog ?: '暂无日志'}">暂无日志</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 自动刷新日志（如果正在执行）
        const isRunning = [[${pipeline.isRunning()}]];
        if (isRunning) {
            setInterval(refreshLogs, 5000);
        }

        function refreshLogs() {
            location.reload();
        }

        // 滚动到日志底部
        const logElement = document.getElementById('executionLog');
        if (logElement) {
            logElement.scrollTop = logElement.scrollHeight;
        }
    </script>
</body>
</html>
