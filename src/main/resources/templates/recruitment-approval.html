<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>招聘审批 - ChengXun Game Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
    <style>
        .request-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            transition: all 0.2s;
        }
        .request-card:hover {
            border-color: var(--accent-color);
        }
        .status-pending { border-left: 4px solid #ffc107; }
        .status-approved { border-left: 4px solid #198754; }
        .status-rejected { border-left: 4px solid #dc3545; }
        .status-executed { border-left: 4px solid #0d6efd; }
        .status-cancelled { border-left: 4px solid #6c757d; }
        .rejection-reason {
            background: rgba(220, 53, 69, 0.1);
            border-left: 3px solid #dc3545;
            padding: 0.75rem;
            border-radius: 5px;
            margin-top: 0.5rem;
        }
        .approval-comment {
            background: rgba(25, 135, 84, 0.1);
            border-left: 3px solid #198754;
            padding: 0.75rem;
            border-radius: 5px;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body class="bg-dark text-light">
    <div class="container-fluid mt-4">
        <!-- 页面标题 -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h2><i class="bi bi-person-check"></i> 招聘审批</h2>
                        <p class="text-muted mb-0">管理员审批制作人的招聘申请</p>
                    </div>
                    <div>
                        <button class="btn btn-outline-primary" onclick="loadData()">
                            <i class="bi bi-arrow-clockwise"></i> 刷新
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card bg-warning bg-gradient text-dark">
                    <div class="card-body text-center">
                        <h6 class="card-title">待审批</h6>
                        <h2 id="pendingCount">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-success bg-gradient text-white">
                    <div class="card-body text-center">
                        <h6 class="card-title">已批准</h6>
                        <h2 id="approvedCount">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-danger bg-gradient text-white">
                    <div class="card-body text-center">
                        <h6 class="card-title">已驳回</h6>
                        <h2 id="rejectedCount">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-info bg-gradient text-white">
                    <div class="card-body text-center">
                        <h6 class="card-title">已执行</h6>
                        <h2 id="executedCount">0</h2>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab导航 -->
        <ul class="nav nav-tabs mb-4" role="tablist">
            <li class="nav-item">
                <a class="nav-link active" data-bs-toggle="tab" href="#pending">待审批</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" data-bs-toggle="tab" href="#all">所有申请</a>
            </li>
        </ul>

        <!-- Tab内容 -->
        <div class="tab-content">
            <!-- 待审批列表 -->
            <div class="tab-pane fade show active" id="pending">
                <div id="pendingList">
                    <!-- 待审批申请 -->
                </div>
                <div id="noPending" class="text-center py-5" style="display: none;">
                    <i class="bi bi-check-circle fs-1 text-success"></i>
                    <h4 class="mt-3">暂无待审批申请</h4>
                    <p class="text-muted">所有招聘申请已处理</p>
                </div>
            </div>

            <!-- 所有申请列表 -->
            <div class="tab-pane fade" id="all">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>申请编号</th>
                                <th>制作人</th>
                                <th>招聘角色</th>
                                <th>员工姓名</th>
                                <th>状态</th>
                                <th>提交时间</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="allRequestsList">
                            <!-- 所有申请 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 审批模态框 -->
    <div class="modal fade" id="approvalModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">审批招聘申请</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="requestDetail">
                        <!-- 申请详情 -->
                    </div>
                    <hr>
                    <div class="mb-3">
                        <label class="form-label">审批意见</label>
                        <textarea class="form-control" id="approvalComment" rows="3" placeholder="请输入审批意见..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-danger" onclick="rejectRequest()">
                        <i class="bi bi-x-circle"></i> 驳回
                    </button>
                    <button type="button" class="btn btn-success" onclick="approveRequest()">
                        <i class="bi bi-check-circle"></i> 批准
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentRequestId = null;

        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        // 加载数据
        async function loadData() {
            await Promise.all([
                loadPendingRequests(),
                loadAllRequests(),
                loadStatistics()
            ]);
        }

        // 加载待审批申请
        async function loadPendingRequests() {
            try {
                const response = await fetch('/api/recruitment-approval/pending');
                const requests = await response.json();

                const container = document.getElementById('pendingList');
                container.innerHTML = '';

                if (requests.length === 0) {
                    document.getElementById('noPending').style.display = 'block';
                    return;
                }

                document.getElementById('noPending').style.display = 'none';

                requests.forEach(request => {
                    const card = document.createElement('div');
                    card.className = 'request-card p-3 mb-3 status-pending';
                    card.innerHTML = `
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <h5 class="mb-1">${request.requestNo}</h5>
                                <p class="text-muted mb-2">
                                    制作人: ${request.producerName} |
                                    提交时间: ${formatDate(request.createdAt)}
                                </p>
                            </div>
                            <span class="badge bg-warning">待审批</span>
                        </div>
                        <hr>
                        <div class="row">
                            <div class="col-md-6">
                                <p><strong>招聘角色：</strong>${request.roleName || request.role}</p>
                                <p><strong>员工姓名：</strong>${request.employeeName}</p>
                                <p><strong>工作目录：</strong><code>${request.workDir || '-'}</code></p>
                            </div>
                            <div class="col-md-6">
                                <p><strong>招聘原因：</strong></p>
                                <p class="text-muted">${request.reason || '-'}</p>
                            </div>
                        </div>
                        ${request.description ? `
                            <div class="mt-2">
                                <strong>角色描述：</strong>
                                <p class="text-muted">${request.description}</p>
                            </div>
                        ` : ''}
                        <div class="mt-3 text-end">
                            <button class="btn btn-success btn-sm" onclick="openApprovalModal(${request.id})">
                                <i class="bi bi-check2-all"></i> 审批
                            </button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error('Failed to load pending requests:', error);
            }
        }

        // 加载所有申请
        async function loadAllRequests() {
            try {
                const response = await fetch('/api/recruitment-approval/all');
                const requests = await response.json();

                const tbody = document.getElementById('allRequestsList');
                tbody.innerHTML = '';

                requests.forEach(request => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><code>${request.requestNo}</code></td>
                        <td>${request.producerName}</td>
                        <td>${request.roleName || request.role}</td>
                        <td>${request.employeeName}</td>
                        <td>
                            <span class="badge ${getStatusBadgeClass(request.status)}">
                                ${getStatusText(request.status)}
                            </span>
                        </td>
                        <td>${formatDate(request.createdAt)}</td>
                        <td>
                            <button class="btn btn-outline-primary btn-sm" onclick="viewDetail(${request.id})">
                                <i class="bi bi-eye"></i>
                            </button>
                            ${request.status === 'PENDING' ? `
                                <button class="btn btn-outline-success btn-sm" onclick="openApprovalModal(${request.id})">
                                    <i class="bi bi-check2-all"></i>
                                </button>
                            ` : ''}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error('Failed to load all requests:', error);
            }
        }

        // 加载统计
        async function loadStatistics() {
            try {
                const response = await fetch('/api/recruitment-approval/stats');
                const stats = await response.json();

                document.getElementById('pendingCount').textContent = stats.statusCounts?.PENDING || 0;
                document.getElementById('approvedCount').textContent = stats.statusCounts?.APPROVED || 0;
                document.getElementById('rejectedCount').textContent = stats.statusCounts?.REJECTED || 0;
                document.getElementById('executedCount').textContent = stats.statusCounts?.EXECUTED || 0;
            } catch (error) {
                console.error('Failed to load statistics:', error);
            }
        }

        // 打开审批模态框
        async function openApprovalModal(requestId) {
            currentRequestId = requestId;

            try {
                const response = await fetch(`/api/recruitment-approval/${requestId}`);
                const request = await response.json();

                const detail = document.getElementById('requestDetail');
                detail.innerHTML = `
                    <h6>申请编号：${request.requestNo}</h6>
                    <div class="row mt-3">
                        <div class="col-6">
                            <p><strong>制作人：</strong>${request.producerName}</p>
                            <p><strong>招聘角色：</strong>${request.roleName || request.role}</p>
                            <p><strong>员工姓名：</strong>${request.employeeName}</p>
                        </div>
                        <div class="col-6">
                            <p><strong>工作目录：</strong><code>${request.workDir || '-'}</code></p>
                            <p><strong>自定义角色：</strong>${request.isCustomRole ? '是' : '否'}</p>
                        </div>
                    </div>
                    <div class="mt-2">
                        <strong>招聘原因：</strong>
                        <p class="text-muted">${request.reason || '-'}</p>
                    </div>
                    ${request.description ? `
                        <div class="mt-2">
                            <strong>角色描述：</strong>
                            <p class="text-muted">${request.description}</p>
                        </div>
                    ` : ''}
                    ${request.capabilities ? `
                        <div class="mt-2">
                            <strong>能力要求：</strong>
                            <p class="text-muted">${request.capabilities}</p>
                        </div>
                    ` : ''}
                `;

                document.getElementById('approvalComment').value = '';

                const modal = new bootstrap.Modal(document.getElementById('approvalModal'));
                modal.show();
            } catch (error) {
                console.error('Failed to load request detail:', error);
            }
        }

        // 批准申请
        async function approveRequest() {
            if (!currentRequestId) return;

            const comment = document.getElementById('approvalComment').value;

            try {
                const response = await fetch(`/api/recruitment-approval/${currentRequestId}/approve?comment=${encodeURIComponent(comment)}`, {
                    method: 'POST'
                });

                const result = await response.json();

                if (result.status === 'success') {
                    alert('申请已批准');
                    bootstrap.Modal.getInstance(document.getElementById('approvalModal')).hide();
                    loadData();
                } else {
                    alert('审批失败: ' + result.message);
                }
            } catch (error) {
                alert('请求失败: ' + error.message);
            }
        }

        // 驳回申请
        async function rejectRequest() {
            if (!currentRequestId) return;

            const reason = document.getElementById('approvalComment').value;
            if (!reason.trim()) {
                alert('请输入驳回原因');
                return;
            }

            try {
                const response = await fetch(`/api/recruitment-approval/${currentRequestId}/reject?reason=${encodeURIComponent(reason)}`, {
                    method: 'POST'
                });

                const result = await response.json();

                if (result.status === 'success') {
                    alert('申请已驳回');
                    bootstrap.Modal.getInstance(document.getElementById('approvalModal')).hide();
                    loadData();
                } else {
                    alert('驳回失败: ' + result.message);
                }
            } catch (error) {
                alert('请求失败: ' + error.message);
            }
        }

        // 查看详情
        async function viewDetail(requestId) {
            await openApprovalModal(requestId);
        }

        // 获取状态徽章类
        function getStatusBadgeClass(status) {
            switch (status) {
                case 'PENDING': return 'bg-warning text-dark';
                case 'APPROVED': return 'bg-success';
                case 'REJECTED': return 'bg-danger';
                case 'EXECUTED': return 'bg-info';
                case 'CANCELLED': return 'bg-secondary';
                case 'REVISED': return 'bg-primary';
                default: return 'bg-secondary';
            }
        }

        // 获取状态文本
        function getStatusText(status) {
            switch (status) {
                case 'PENDING': return '待审批';
                case 'APPROVED': return '已批准';
                case 'REJECTED': return '已驳回';
                case 'EXECUTED': return '已执行';
                case 'CANCELLED': return '已取消';
                case 'REVISED': return '已重新申请';
                default: return status;
            }
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN');
        }
    </script>
</body>
</html>
