<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'代码浏览 - ' + ${project.name}">代码浏览</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}"><i class="bi bi-controller"></i> ChengXun Game Maker</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-speedometer2"></i> 仪表盘</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/agents}"><i class="bi bi-robot"></i> Agents</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/projects}"><i class="bi bi-folder"></i> 项目</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/code}"><i class="bi bi-code-slash"></i> 代码管理</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/agent-logs}"><i class="bi bi-journal-text"></i> Agent 日志</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span th:text="${username}">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                            <li><form th:action="@{/logout}" method="post"><button class="dropdown-item" type="submit"><i class="bi bi-box-arrow-right"></i> 退出</button></form></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/code}" class="text-decoration-none">代码管理</a></li>
                <li class="breadcrumb-item">
                    <a th:href="@{/code/browse/{id}(id=${projectId})}" class="text-decoration-none" th:text="${project.name}"></a>
                </li>
                <li th:if="${!currentPath.isEmpty()}" class="breadcrumb-item active" th:text="${currentPath}"></li>
            </ol>
        </nav>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4><i class="bi bi-folder2-open"></i>
                <span th:text="${currentPath.isEmpty() ? project.name : currentPath}"></span>
            </h4>
            <div class="d-flex gap-2">
                <!-- Search -->
                <form th:action="@{/code/search/{id}(id=${projectId})}" method="get" class="d-flex gap-1">
                    <input type="text" name="keyword" class="form-control form-control-sm bg-dark text-light border-secondary"
                           placeholder="搜索代码..." required style="width: 200px;">
                    <button type="submit" class="btn btn-sm btn-outline-primary"><i class="bi bi-search"></i></button>
                </form>
                <a th:href="@{/code/git/{id}(id=${projectId})}" class="btn btn-sm btn-outline-info">
                    <i class="bi bi-git"></i> Git
                </a>
            </div>
        </div>

        <!-- File List -->
        <div class="card bg-dark border-secondary">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-dark table-hover mb-0">
                        <thead>
                            <tr>
                                <th style="width: 40px;"></th>
                                <th>名称</th>
                                <th style="width: 120px;">大小</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Parent directory -->
                            <tr th:unless="${currentPath.isEmpty()}">
                                <td><i class="bi bi-arrow-up-circle text-primary"></i></td>
                                <td>
                                    <a th:href="@{/code/browse/{id}(id=${projectId}, path=${parentPath})}"
                                       class="text-decoration-none text-light">..</a>
                                </td>
                                <td></td>
                            </tr>
                            <!-- Files and directories -->
                            <tr th:each="file : ${files}">
                                <td><i th:class="'bi ' + ${file.icon}"></i></td>
                                <td>
                                    <a th:if="${file.directory}"
                                       th:href="@{/code/browse/{id}(id=${projectId}, path=${currentPath.isEmpty() ? file.name : currentPath + '/' + file.name})}"
                                       class="text-decoration-none text-warning">
                                        <i class="bi bi-folder-fill me-1"></i><span th:text="${file.name}"></span>
                                    </a>
                                    <a th:unless="${file.directory}"
                                       th:href="@{/code/view/{id}(id=${projectId}, path=${currentPath.isEmpty() ? file.name : currentPath + '/' + file.name})}"
                                       class="text-decoration-none text-light">
                                        <span th:text="${file.name}"></span>
                                    </a>
                                </td>
                                <td class="text-muted small" th:text="${file.sizeFormatted}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <p th:if="${#lists.isEmpty(files)}" class="text-muted text-center py-4 mb-0">空目录</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
