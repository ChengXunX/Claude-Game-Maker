<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代码管理 - ChengXun Game Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}"><i class="bi bi-controller"></i> ChengXun Game Maker</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-speedometer2"></i> 仪表盘</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/agents}"><i class="bi bi-robot"></i> Agents</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/projects}"><i class="bi bi-folder"></i> 项目</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/skills}"><i class="bi bi-lightning"></i> 技能</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/tokens}"><i class="bi bi-key"></i> Token 管理</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/monitor}"><i class="bi bi-graph-up"></i> 监控</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/users}"><i class="bi bi-people"></i> 用户管理</a></li>
                    <li class="nav-item"><a class="nav-link active" th:href="@{/code}"><i class="bi bi-code-slash"></i> 代码管理</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/admin/settings}"><i class="bi bi-gear"></i> 设置</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span th:text="${username}">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                            <li><a class="dropdown-item" th:href="@{/profile}"><i class="bi bi-person"></i> 个人中心</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><form th:action="@{/logout}" method="post"><button class="dropdown-item" type="submit"><i class="bi bi-box-arrow-right"></i> 退出登录</button></form></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <h2 class="mb-4"><i class="bi bi-code-slash"></i> AI 代码管理</h2>

        <div class="row">
            <div th:each="project : ${projects}" class="col-md-4 mb-4">
                <div class="card bg-dark border-secondary h-100">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="mb-0" th:text="${project.name}"></h5>
                        <span class="badge bg-primary" th:text="${project.status}"></span>
                    </div>
                    <div class="card-body">
                        <p><strong>工作目录：</strong><br><code th:text="${project.workDir}"></code></p>
                        <p><strong>描述：</strong><span th:text="${project.description ?: '无'}"></span></p>
                    </div>
                    <div class="card-footer d-flex gap-2">
                        <a th:href="@{/code/browse/{id}(id=${project.id})}" class="btn btn-primary btn-sm">
                            <i class="bi bi-folder2-open"></i> 浏览代码
                        </a>
                        <a th:href="@{/code/git/{id}(id=${project.id})}" class="btn btn-info btn-sm">
                            <i class="bi bi-git"></i> Git 管理
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(projects)}" class="text-center py-5">
            <i class="bi bi-code-slash" style="font-size: 4rem; opacity: 0.5;"></i>
            <h4 class="mt-3">暂无项目</h4>
            <p class="text-muted">请先在项目管理中创建项目</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
