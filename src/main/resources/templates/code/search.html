<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'代码搜索 - ' + ${project.name}">代码搜索</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .search-context { font-family: 'Consolas', monospace; font-size: 0.85rem; }
        .search-keyword { background: rgba(255, 255, 0, 0.4); padding: 1px 2px; border-radius: 2px; }
    </style>
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}"><i class="bi bi-controller"></i> ChengXun Game Maker</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" th:href="@{/}"><i class="bi bi-speedometer2"></i> 仪表盘</a></li>
                    <li class="nav-item"><a class="nav-link" th:href="@{/code}"><i class="bi bi-code-slash"></i> 代码管理</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span th:text="${username}">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                            <li><form th:action="@{/logout}" method="post"><button class="dropdown-item" type="submit"><i class="bi bi-box-arrow-right"></i> 退出</button></form></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/code}" class="text-decoration-none">代码管理</a></li>
                <li class="breadcrumb-item"><a th:href="@{/code/browse/{id}(id=${projectId})}" class="text-decoration-none" th:text="${project.name}"></a></li>
                <li class="breadcrumb-item active">搜索结果</li>
            </ol>
        </nav>

        <div class="d-flex justify-content-between align-items-center mb-3">
            <h4><i class="bi bi-search"></i> 搜索 "<span th:text="${keyword}"></span>"</h4>
            <span class="badge bg-info fs-6" th:text="${resultCount} + ' 个匹配'">0</span>
        </div>

        <!-- Search Again -->
        <form th:action="@{/code/search/{id}(id=${projectId})}" method="get" class="d-flex gap-2 mb-4" style="max-width: 400px;">
            <input type="text" name="keyword" class="form-control form-control-sm bg-dark text-light border-secondary"
                   th:value="${keyword}" placeholder="搜索代码...">
            <button type="submit" class="btn btn-primary btn-sm"><i class="bi bi-search"></i> 搜索</button>
        </form>

        <!-- Results -->
        <div class="card bg-dark border-secondary">
            <div class="card-body p-0">
                <div th:each="result : ${results}" class="border-bottom border-secondary p-3">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <a th:href="@{/code/view/{id}(id=${projectId}, path=${result.filePath}, search=${keyword})}"
                           class="text-decoration-none text-primary fw-bold">
                            <i class="bi bi-file-earmark-code"></i>
                            <span th:text="${result.filePath}"></span>
                        </a>
                        <span class="badge bg-secondary" th:text="'行 ' + ${result.lineNumber}"></span>
                    </div>
                    <div class="search-context text-muted ms-4" th:text="${result.context}"></div>
                </div>
                <p th:if="${#lists.isEmpty(results)}" class="text-muted text-center py-4 mb-0">未找到匹配结果</p>
            </div>
        </div>

        <div th:if="${resultCount >= 200}" class="alert alert-warning mt-3">
            <i class="bi bi-exclamation-triangle"></i> 结果过多，仅显示前 200 条。请使用更精确的关键词。
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
