<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent 能力评估 - ChengXun Game Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/custom.css}" rel="stylesheet">
    <style>
        .performance-card {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
            border: 1px solid var(--border-color);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .performance-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px var(--shadow-color);
        }
        .grade-badge {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .grade-S { background: linear-gradient(135deg, #ffd700, #ffed4e); color: #000; }
        .grade-A { background: linear-gradient(135deg, #00bfff, #87cefa); color: #fff; }
        .grade-B { background: linear-gradient(135deg, #32cd32, #90ee90); color: #fff; }
        .grade-C { background: linear-gradient(135deg, #ffa500, #ffd700); color: #000; }
        .grade-D { background: linear-gradient(135deg, #ff6347, #ff7f7f); color: #fff; }
        .stat-card {
            background: var(--bg-card);
            border-left: 4px solid var(--accent-color);
        }
        .load-indicator {
            height: 8px;
            border-radius: 4px;
            background: var(--bg-tertiary);
            overflow: hidden;
        }
        .load-bar {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .load-low { background: linear-gradient(90deg, #32cd32, #90ee90); }
        .load-medium { background: linear-gradient(90deg, #ffa500, #ffd700); }
        .load-high { background: linear-gradient(90deg, #ff6347, #ff7f7f); }
    </style>
</head>
<body class="bg-dark text-light">
    <div class="container-fluid mt-4">
        <!-- 页面标题 -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h2><i class="bi bi-graph-up"></i> Agent 能力评估</h2>
                        <p class="text-muted mb-0">监控Agent性能、评估能力、智能任务分配</p>
                    </div>
                    <div>
                        <button class="btn btn-outline-primary" onclick="refreshData()">
                            <i class="bi bi-arrow-clockwise"></i> 刷新数据
                        </button>
                        <button class="btn btn-primary" onclick="triggerEvaluation()">
                            <i class="bi bi-lightning"></i> 触发评估
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 统计卡片 -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h6 class="card-subtitle mb-2 text-muted">总Agent数</h6>
                                <h2 class="card-title mb-0" th:text="${summary.totalAgents}">0</h2>
                            </div>
                            <div class="align-self-center">
                                <i class="bi bi-robot fs-1 text-primary"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card" style="border-left-color: var(--success-color);">
                    <div class="card-body">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h6 class="card-subtitle mb-2 text-muted">完成任务</h6>
                                <h2 class="card-title mb-0" th:text="${summary.completedTasks}">0</h2>
                            </div>
                            <div class="align-self-center">
                                <i class="bi bi-check-circle fs-1 text-success"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card" style="border-left-color: var(--warning-color);">
                    <div class="card-body">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h6 class="card-subtitle mb-2 text-muted">平均评分</h6>
                                <h2 class="card-title mb-0" th:text="${#numbers.formatDecimal(summary.avgOverallScore, 1, 1)}">0.0</h2>
                            </div>
                            <div class="align-self-center">
                                <i class="bi bi-star fs-1 text-warning"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card" style="border-left-color: var(--danger-color);">
                    <div class="card-body">
                        <div class="d-flex justify-content-between">
                            <div>
                                <h6 class="card-subtitle mb-2 text-muted">需要关注</h6>
                                <h2 class="card-title mb-0" th:text="${#lists.size(attentionNeeded)}">0</h2>
                            </div>
                            <div class="align-self-center">
                                <i class="bi bi-exclamation-triangle fs-1 text-danger"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row">
            <!-- 左侧：Agent性能列表 -->
            <div class="col-lg-8">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-trophy"></i> Agent 性能排名</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead>
                                    <tr>
                                        <th>排名</th>
                                        <th>Agent</th>
                                        <th>角色</th>
                                        <th>等级</th>
                                        <th>综合评分</th>
                                        <th>完成率</th>
                                        <th>负载</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="perf, iter : ${performances}">
                                        <td>
                                            <span class="badge bg-primary" th:text="${iter.count}">1</span>
                                        </td>
                                        <td>
                                            <div>
                                                <strong th:text="${perf.agentName}">Agent Name</strong>
                                                <br>
                                                <small class="text-muted" th:text="${perf.agentId}">agent-id</small>
                                            </div>
                                        </td>
                                        <td>
                                            <span class="badge bg-secondary" th:text="${perf.agentRole}">role</span>
                                        </td>
                                        <td>
                                            <div class="grade-badge"
                                                 th:classappend="'grade-' + ${perf.performanceGrade}"
                                                 th:text="${perf.performanceGrade}">A</div>
                                        </td>
                                        <td>
                                            <strong th:text="${#numbers.formatDecimal(perf.overallScore, 1, 1)}">0.0</strong>
                                        </td>
                                        <td>
                                            <span th:text="${#numbers.formatDecimal(perf.completionRate, 1, 1)}">0.0</span>%
                                        </td>
                                        <td>
                                            <div class="load-indicator" style="width: 80px;">
                                                <div class="load-bar"
                                                     th:classappend="${perf.currentLoad < 50 ? 'load-low' : (perf.currentLoad < 80 ? 'load-medium' : 'load-high')}"
                                                     th:style="'width: ' + ${perf.currentLoad} + '%'">
                                                </div>
                                            </div>
                                            <small th:text="${perf.currentLoad} + '%'">0%</small>
                                        </td>
                                        <td>
                                            <a th:href="@{/performance/agent/{id}(id=${perf.agentId})}"
                                               class="btn btn-sm btn-outline-primary">
                                                <i class="bi bi-eye"></i> 详情
                                            </a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 右侧：统计和关注列表 -->
            <div class="col-lg-4">
                <!-- 等级分布 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-pie-chart"></i> 等级分布</h5>
                    </div>
                    <div class="card-body">
                        <div class="row text-center">
                            <div class="col" th:each="entry : ${summary.gradeDistribution}">
                                <div class="grade-badge mx-auto mb-2"
                                     th:classappend="'grade-' + ${entry.key}"
                                     th:text="${entry.key}">S</div>
                                <h4 th:text="${entry.value}">0</h4>
                                <small class="text-muted" th:text="${entry.key} + '级'">S级</small>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 角色统计 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-diagram-3"></i> 角色统计</h5>
                    </div>
                    <div class="card-body">
                        <div th:each="entry : ${roleStats}" class="mb-3">
                            <div class="d-flex justify-content-between mb-1">
                                <span th:text="${entry.key}">role</span>
                                <span th:text="${entry.value.agentCount} + '个Agent'">0个Agent</span>
                            </div>
                            <div class="load-indicator">
                                <div class="load-bar load-low" th:style="'width: ' + ${entry.value.avgScore} + '%'"></div>
                            </div>
                            <small class="text-muted">平均评分: <span th:text="${#numbers.formatDecimal(entry.value.avgScore, 1, 1)}">0.0</span></small>
                        </div>
                    </div>
                </div>

                <!-- 需要关注的Agent -->
                <div class="card mb-4" th:if="${!attentionNeeded.isEmpty()}">
                    <div class="card-header bg-warning text-dark">
                        <h5 class="mb-0"><i class="bi bi-exclamation-triangle"></i> 需要关注</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="list-group list-group-flush">
                            <div th:each="perf : ${attentionNeeded}"
                                 class="list-group-item list-group-item-action">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <h6 class="mb-0" th:text="${perf.agentName}">Agent Name</h6>
                                        <small class="text-muted" th:text="${perf.statusDescription}">状态</small>
                                    </div>
                                    <div class="text-end">
                                        <div th:if="${perf.overallScore < 60}">
                                            <span class="badge bg-danger">评分低</span>
                                            <small th:text="${#numbers.formatDecimal(perf.overallScore, 1, 1)}">0.0</small>
                                        </div>
                                        <div th:if="${perf.currentLoad > 80}">
                                            <span class="badge bg-warning text-dark">高负载</span>
                                            <small th:text="${perf.currentLoad} + '%'">0%</small>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function refreshData() {
            location.reload();
        }

        function triggerEvaluation() {
            if (confirm('确定要触发性能评估吗？这将重新计算所有Agent的评分。')) {
                fetch('/performance/api/evaluate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        alert('性能评估已触发，数据将很快更新。');
                        location.reload();
                    } else {
                        alert('错误: ' + data.message);
                    }
                })
                .catch(error => {
                    alert('请求失败: ' + error);
                });
            }
        }
    </script>
</body>
</html>
