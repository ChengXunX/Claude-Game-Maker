<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - ChengXun Game Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">
                <i class="bi bi-controller"></i> ChengXun Game Maker
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">
                            <i class="bi bi-speedometer2"></i> 仪表盘
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/agents}">
                            <i class="bi bi-robot"></i> Agents
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/projects}">
                            <i class="bi bi-folder"></i> 项目
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/skills}">
                            <i class="bi bi-lightning"></i> 技能
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/tokens}">
                            <i class="bi bi-key"></i> Token 管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/monitor}">
                            <i class="bi bi-graph-up"></i> 监控
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/admin/users}">
                            <i class="bi bi-people"></i> 用户管理
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAuthority('PERM_roles:manage')">
                        <a class="nav-link" th:href="@{/roles}">
                            <i class="bi bi-shield-lock"></i> 角色管理
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span th:text="${username}">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                            <li>
                                <a class="dropdown-item active" th:href="@{/profile}">
                                    <i class="bi bi-person"></i> 个人中心
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" th:href="@{/devices}">
                                    <i class="bi bi-laptop"></i> 设备管理
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <button class="dropdown-item" type="submit">
                                        <i class="bi bi-box-arrow-right"></i> 退出登录
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">首页</a></li>
                <li class="breadcrumb-item active">个人中心</li>
            </ol>
        </nav>

        <h2 class="mb-4"><i class="bi bi-person"></i> 个人中心</h2>

        <!-- Alerts -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row">
            <!-- Profile Info -->
            <div class="col-md-4">
                <div class="card bg-dark border-secondary mb-4">
                    <div class="card-body text-center">
                        <div class="mb-3">
                            <i class="bi bi-person-circle" style="font-size: 5rem; opacity: 0.5;"></i>
                        </div>
                        <h4 th:text="${user.nickname ?: user.username}">User</h4>
                        <p class="text-muted" th:text="'@' + ${user.username}">@username</p>
                        <span class="badge" th:classappend="${user.admin ? 'bg-danger' : 'bg-secondary'}"
                              th:text="${user.role != null ? user.role.displayName : '未分配'}"></span>
                        <hr class="border-secondary">
                        <div class="text-start">
                            <p><strong>邮箱：</strong><span th:text="${user.email ?: '未设置'}"></span></p>
                            <p><strong>注册时间：</strong><br>
                                <small th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"></small>
                            </p>
                            <p><strong>状态：</strong>
                                <span th:switch="${user.status.name()}">
                                    <span th:case="'APPROVED'" class="badge bg-success">已审核</span>
                                    <span th:case="'PENDING'" class="badge bg-warning">待审核</span>
                                    <span th:case="'REJECTED'" class="badge bg-danger">已拒绝</span>
                                    <span th:case="'DISABLED'" class="badge bg-dark">已禁用</span>
                                </span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Edit Forms -->
            <div class="col-md-8">
                <!-- Edit Profile -->
                <div class="card bg-dark border-secondary mb-4">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-pencil"></i> 编辑个人信息</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/profile/update}" method="post">
                            <div class="mb-3">
                                <label class="form-label">用户名</label>
                                <input type="text" class="form-control bg-dark text-light border-secondary"
                                       th:value="${user.username}" disabled>
                                <div class="form-text">用户名不可修改</div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">昵称</label>
                                <input type="text" class="form-control bg-dark text-light border-secondary"
                                       name="nickname" th:value="${user.nickname}" placeholder="输入昵称">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">邮箱</label>
                                <input type="email" class="form-control bg-dark text-light border-secondary"
                                       name="email" th:value="${user.email}" placeholder="输入邮箱">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">头像 URL</label>
                                <input type="url" class="form-control bg-dark text-light border-secondary"
                                       name="avatar" th:value="${user.avatar}" placeholder="输入头像图片链接">
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save"></i> 保存修改
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Change Password -->
                <div class="card bg-dark border-secondary">
                    <div class="card-header">
                        <h5 class="mb-0"><i class="bi bi-lock"></i> 修改密码</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/profile/password}" method="post">
                            <div class="mb-3">
                                <label class="form-label">当前密码</label>
                                <input type="password" class="form-control bg-dark text-light border-secondary"
                                       name="currentPassword" required placeholder="输入当前密码">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">新密码</label>
                                <input type="password" class="form-control bg-dark text-light border-secondary"
                                       name="newPassword" required minlength="6" placeholder="输入新密码（至少 6 位）">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">确认新密码</label>
                                <input type="password" class="form-control bg-dark text-light border-secondary"
                                       name="confirmPassword" required minlength="6" placeholder="再次输入新密码">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">验证码</label>
                                <div class="d-flex align-items-center gap-2">
                                    <input type="text" class="form-control bg-dark text-light border-secondary"
                                           name="captchaCode" required placeholder="请输入验证码"
                                           maxlength="5" style="max-width: 150px;">
                                    <input type="hidden" name="captchaId" th:value="${captchaId}">
                                    <img th:src="${captchaImage}" id="captchaImg"
                                         onclick="refreshCaptcha()" title="点击刷新验证码"
                                         style="cursor: pointer; border-radius: 5px; height: 44px;">
                                    <button type="button" class="btn btn-outline-light btn-sm"
                                            onclick="refreshCaptcha()" title="刷新验证码">
                                        <i class="bi bi-arrow-clockwise"></i>
                                    </button>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-warning">
                                <i class="bi bi-key"></i> 修改密码
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function refreshCaptcha() {
            fetch('/captcha/generate')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('captchaImg').src = data.image;
                    document.querySelector('input[name="captchaId"]').value = data.captchaId;
                });
        }
    </script>
</body>
</html>
