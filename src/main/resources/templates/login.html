<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - ChengXun Game Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
        }
        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }
        .form-control:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #0d6efd;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.25);
        }
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-controller text-primary" style="font-size: 3rem;"></i>
                    <h2 class="text-white mt-2">ChengXun Game Maker</h2>
                    <p class="text-light opacity-75">游戏开发自动化管理系统</p>
                </div>

                <div class="login-card p-4">
                    <div th:if="${param.error}" class="alert alert-danger">
                        <i class="bi bi-exclamation-circle"></i> 用户名或密码错误，或账号未审核
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info">
                        <i class="bi bi-info-circle"></i> 已成功退出登录
                    </div>
                    <div th:if="${success}" class="alert alert-success">
                        <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label text-light">用户名</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent text-light border-end-0">
                                    <i class="bi bi-person"></i>
                                </span>
                                <input type="text" class="form-control border-start-0" name="username"
                                       placeholder="请输入用户名" required autofocus>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-light">密码</label>
                            <div class="input-group">
                                <span class="input-group-text bg-transparent text-light border-end-0">
                                    <i class="bi bi-lock"></i>
                                </span>
                                <input type="password" class="form-control border-start-0" name="password"
                                       placeholder="请输入密码" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="bi bi-box-arrow-in-right"></i> 登录
                        </button>
                    </form>

                    <div class="text-center">
                        <a th:href="@{/register}" class="text-light opacity-75 text-decoration-none">
                            还没有账号？<span class="text-primary">立即注册</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
