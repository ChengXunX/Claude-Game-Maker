<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token 管理 - ChengXun Game Maker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand" th:href="@{/}">
                <i class="bi bi-controller"></i> ChengXun Game Maker
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">
                            <i class="bi bi-speedometer2"></i> 仪表盘
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/agents}">
                            <i class="bi bi-robot"></i> Agents
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/projects}">
                            <i class="bi bi-folder"></i> 项目
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" th:href="@{/tokens}">
                            <i class="bi bi-key"></i> Token 管理
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/skills}">
                            <i class="bi bi-lightning"></i> 技能
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/monitor}">
                            <i class="bi bi-graph-up"></i> 监控
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link" th:href="@{/admin/users}">
                            <i class="bi bi-people"></i> 用户管理
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAuthority('PERM_roles:manage')">
                        <a class="nav-link" th:href="@{/roles}">
                            <i class="bi bi-shield-lock"></i> 角色管理
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> <span th:text="${username}">User</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                            <li>
                                <a class="dropdown-item" th:href="@{/profile}">
                                    <i class="bi bi-person"></i> 个人中心
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form th:action="@{/logout}" method="post">
                                    <button class="dropdown-item" type="submit">
                                        <i class="bi bi-box-arrow-right"></i> 退出登录
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-key"></i> Token 管理</h2>
            <a th:href="@{/tokens/create}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> 添加 Token
            </a>
        </div>

        <!-- Alerts -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Stats -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card bg-primary bg-gradient text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title opacity-75">总 Token 数</h6>
                                <h2 th:text="${tokens.size()}">0</h2>
                            </div>
                            <i class="bi bi-key" style="font-size: 2.5rem; opacity: 0.5;"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-success bg-gradient text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title opacity-75">活跃 Token</h6>
                                <h2 th:text="${activeCount}">0</h2>
                            </div>
                            <i class="bi bi-check-circle" style="font-size: 2.5rem; opacity: 0.5;"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-info bg-gradient text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title opacity-75">已分配</h6>
                                <h2 th:text="${assignedCount}">0</h2>
                            </div>
                            <i class="bi bi-robot" style="font-size: 2.5rem; opacity: 0.5;"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-warning bg-gradient text-white">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <h6 class="card-title opacity-75">未分配</h6>
                                <h2 th:text="${tokens.size() - assignedCount}">0</h2>
                            </div>
                            <i class="bi bi-question-circle" style="font-size: 2.5rem; opacity: 0.5;"></i>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Token List -->
        <div class="card bg-dark border-secondary">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-dark table-hover">
                        <thead>
                            <tr>
                                <th>名称</th>
                                <th>API Key</th>
                                <th>API URL</th>
                                <th>模型</th>
                                <th>状态</th>
                                <th>分配给</th>
                                <th>使用次数</th>
                                <th>最后使用</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="token : ${tokens}">
                                <td>
                                    <strong th:text="${token.name}"></strong>
                                    <br>
                                    <small class="text-muted" th:text="${token.description}"></small>
                                </td>
                                <td>
                                    <code th:text="${token.maskedApiKey}"></code>
                                </td>
                                <td>
                                    <small th:text="${token.apiUrl ?: '-'}"></small>
                                </td>
                                <td>
                                    <span class="badge bg-secondary" th:text="${token.model ?: '-'}"></span>
                                </td>
                                <td>
                                    <span th:switch="${token.status.name()}">
                                        <span th:case="'ACTIVE'" class="badge bg-success">活跃</span>
                                        <span th:case="'EXHAUSTED'" class="badge bg-warning">耗尽</span>
                                        <span th:case="'DISABLED'" class="badge bg-danger">禁用</span>
                                        <span th:case="'EXPIRED'" class="badge bg-dark">过期</span>
                                    </span>
                                </td>
                                <td>
                                    <span th:if="${token.assigned}" class="badge bg-info">
                                        <i class="bi bi-robot"></i>
                                        <span th:text="${token.assignedAgentName ?: token.assignedAgentId}"></span>
                                    </span>
                                    <span th:unless="${token.assigned}" class="text-muted">未分配</span>
                                </td>
                                <td th:text="${token.usageCount}"></td>
                                <td>
                                    <small th:if="${token.lastUsedAt}"
                                           th:text="${#temporals.format(token.lastUsedAt, 'MM-dd HH:mm')}"></small>
                                    <span th:unless="${token.lastUsedAt}" class="text-muted">-</span>
                                </td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <!-- 分配/取消分配 -->
                                        <form th:unless="${token.assigned}"
                                              th:action="@{/tokens/{id}/assign(id=${token.id})}" method="post"
                                              style="display: inline-flex; gap: 5px;">
                                            <select name="agentId" class="form-select form-select-sm bg-dark text-light border-secondary"
                                                    style="width: 100px;">
                                                <option value="">选择 Agent</option>
                                                <option th:each="agent : ${agents}"
                                                        th:value="${agent.id}"
                                                        th:text="${agent.name}">
                                                </option>
                                            </select>
                                            <button type="submit" class="btn btn-sm btn-outline-success">
                                                <i class="bi bi-link"></i>
                                            </button>
                                        </form>

                                        <form th:if="${token.assigned}"
                                              th:action="@{/tokens/{id}/unassign(id=${token.id})}" method="post"
                                              style="display: inline;">
                                            <button type="submit" class="btn btn-sm btn-outline-warning"
                                                    title="取消分配">
                                                <i class="bi bi-unlink"></i>
                                            </button>
                                        </form>

                                        <!-- 编辑 -->
                                        <a th:href="@{/tokens/{id}/edit(id=${token.id})}"
                                           class="btn btn-sm btn-outline-primary">
                                            <i class="bi bi-pencil"></i>
                                        </a>

                                        <!-- 删除 -->
                                        <form th:action="@{/tokens/{id}/delete(id=${token.id})}" method="post"
                                              style="display: inline;"
                                              onsubmit="return confirm('确定要删除此 Token 吗？')">
                                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <p th:if="${#lists.isEmpty(tokens)}" class="text-muted text-center py-3">
                    暂无 Token，点击上方按钮添加
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
