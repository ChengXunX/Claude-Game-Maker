# P6Spy 配置文件
# 用于SQL监控和慢SQL检测

# 模块列表
modulelist=com.p6spy.engine.spy.P6SpyFactory,com.p6spy.engine.logging.P6LogFactory

# 自定义日志记录器
appender=com.chengxun.gamemaker.config.SlowSqlLogger

# 日志格式
logMessageFormat=com.p6spy.engine.spy.appender.CustomLineFormat
customLogMessageFormat=%(currentTime)|%(executionTime)|%(connectionId)|%(category)|%(effectiveSql)

# 慢SQL阈值（毫秒）
executionThreshold=500

# 是否显示完整SQL
showSql=true

# 是否显示绑定参数
showParameters=true

# SQL美化输出
databaseDialectDateFormat=yyyy-MM-dd HH:mm:ss

# 排除的SQL模式（正则表达式）
exclude=
# 包含的SQL模式（正则表达式）
include=

# 自动刷新
autoflush=true

# 日志文件路径（可选，这里使用自定义appender）
# logfile=logs/sql.log

# 日期格式
dateformat=yyyy-MM-dd HH:mm:ss

# 是否使用传统模式
usePrefix=false

# 执行SQL过滤
executionThreshold=500
